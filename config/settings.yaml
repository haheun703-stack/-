# ============================================================
# "Quantum Master" v7.0 — 7-Layer Pipeline + Master Controller
# ============================================================
# v7.0 핵심:
#   1. 7-Layer Signal Pipeline (레짐/OU/모멘텀/수급 게이트)
#   2. 4단계 부분청산 (Price Action 논문: 2R/4R/8R/10R)
#   3. HMM 레짐 감지 (동적 적응 전략 논문)
#   4. OU 필터 (평균회귀 종목 선별)
#   5. Walk-Forward 검증 (과최적화 방지)
#   6. TGCI 독립 스코어링 (TRIX Golden Cross Indicator)
#   7. Master Controller 가중 합산 (서브시스템 종합 판정)
# ============================================================

strategy:
  name: "quantum_master_v7.0"

  # === 유니버스 설정 ===
  min_market_cap_조: 0.2       # 시총 하한 (조 단위, 2000억) — rebuild_universe.py 기준
  universe_count: 1022          # 현재 유니버스 종목수 (2026-02-26 기준, 시총 2000억↑)

  # === 수동 블랙리스트 (잼블랙 인사이트) ===
  # 시스템이 추천해도 수동으로 제외할 종목 (악재/리스크 인지)
  # 사유를 메모해두면 나중에 복기에 도움
  blacklist:
    # - ticker: "000000"
    #   reason: "사유 메모"

  # === Pre-screening ===
  min_revenue_억: 1000
  min_daily_trading_value_억: 5
  min_consecutive_profit_quarters: 2

  # === ATR 설정 ===
  atr_period: 14
  atr_pullback_ranges:
    noise: [0, 1.0]        # 0.0점
    shallow: [1.0, 1.5]    # 0.4점
    healthy: [1.5, 2.0]    # 0.7점
    sweet_spot: [2.0, 2.5] # 1.0점 ★
    deep: [2.5, 3.5]       # 0.7점
    structural: [3.5, 999] # 0.4점
  atr_stop_multiplier: 2.0
  atr_target_multiplier: 5.0

  # === 밸류에이션 ===
  value_discount_threshold: 0.9
  eps_revision_lookback_months: 3
  forward_value_ranges:
    deep_discount: [0, 0.7]
    discount: [0.7, 0.9]
    fair: [0.9, 1.1]
    premium: [1.1, 1.3]
    expensive: [1.3, 999]

  # === 모멘텀/수급 ===
  rsi_period: 14
  rsi_sweet_spot: [38, 45]
  stoch_rsi_threshold: 25
  volume_ma_period: 20

  # === Dynamic RSI (변동성 적응형 과매도 기준) ===
  # T = clip(base - k * (ATR/P_norm - 1), min, max)
  # 변동성 높으면 기준 ↓ (엄격), 낮으면 ↑ (관대)
  dynamic_rsi:
    enabled: true
    base: 30                  # 기본 과매도 기준
    min: 20                   # 최소 (고변동성)
    max: 40                   # 최대 (저변동성)
    k: 10                     # 민감도 계수
    lookback: 60              # ATR/P 정규화 기간
    rsi_ema_period: 9         # RSI EMA (반전 확인용)

  # === 추세 필터 ===
  sma_short: 60
  sma_long: 120
  sma_trend: 200
  adx_threshold: 20

  # === 분배 리스크 ===
  drs_max_threshold: 0.60
  drs_lookback: 20
  drs_weights:
    obv_slope: 0.30
    volume_pattern: 0.25
    institutional_flow: 0.25
    bounce_strength: 0.20

  # === BES 가중치 ===
  weights:
    atr_pullback: 0.35
    forward_value: 0.35
    supply_demand: 0.30

  # === v6.4 Gate 4/5 (BES v2.2 패치) ===
  gates:
    atr_pullback_gate:
      enabled: true
      min_pullback_atr: 1.0          # ATR 조정폭 >= 1.0 (노이즈 차단)
    high_52w_gate:
      enabled: true
      max_pct_of_52w_high: 0.95      # 52주 최고가 95% 미만만 통과

  # === v6.4 Consensus Bonus (팩터 수렴 보너스) ===
  consensus_bonus:
    enabled: true
    full_bonus_pct: 0.15             # 3팩터 전부 양호 → +15%
    strong_bonus_pct: 0.08           # 2팩터 양호 → +8%

  # === v6.4 포물선 초점 탐지 ===
  focus_point:
    enabled: true
    lookback_days: 5                 # 추세 분석 기간
    min_rising_factors: 3            # 동시 상승 필요 팩터 수

  # === 등급 기준 ===
  min_entry_grade: "B"           # v7.1: B등급 이상만 진입 허용 (C등급 차단)
  grades:
    A: { min_bes: 0.85, position_ratio: 1.00 }
    B: { min_bes: 0.70, position_ratio: 0.67 }
    C: { min_bes: 0.55, position_ratio: 0.33 }

  # ============================================================
  # 🔥 2단계 트리거 엔진 (Impulse + Confirm)
  # ============================================================
  triggers:
    # ── Trigger-1: 시동 트리거 (공격형, 급등 초입 선점) ──
    # 3개 조건 중 2개 이상 충족 시 발동
    impulse:
      min_conditions: 2          # 3개 중 최소 충족 수
      prev_high_breakout: true   # 전일 고가 돌파 마감
      volume_surge_mult: 1.5     # 거래량 >= 20일 평균 × 1.5
      close_above_ma5: true      # 종가 > 5MA
      # 추가 확인: Higher Low (최근 2개 저점 비교)
      higher_low_check: true
      # 시동 트리거 전용 리스크
      stop_loss_pct: 0.03        # -3% 즉시 손절 (가짜 시동 빠른 컷)
      swing_low_stop: true       # 또는 스윙 저점 이탈 시 즉시 컷

    # ── Trigger-2: 확인 트리거 (보수형, 안전 진입) ──
    confirm:
      ma20_recovery_days: 2      # 20MA 위 복귀 후 2일 연속 유지
      volume_maintain: true      # 거래량 증가/유지
      no_new_low: true           # 저점 갱신 없음
      rsi_above: 50              # RSI > 50 회복
      # 확인 트리거 전용 리스크
      stop_loss_pct: 0.05        # -5% 손절 (확인 후 진입이라 여유)

    # ── 분할 매수 비중 ──
    staged_entry:
      stage1_impulse_pct: 0.40   # 1차: 시동 트리거 → 40%
      stage2_confirm_pct: 0.40   # 2차: 확인 트리거 → 40%
      stage3_breakout_pct: 0.20  # 3차: 전고점 돌파 + 거래량 1.5배 → 20%
      breakout_volume_mult: 1.5  # 3차 진입 거래량 조건

  # ============================================================
  # 🔥 듀얼 트리거 시스템 (v2.5 신규)
  # ============================================================
  dual_trigger:
    enabled: true

    # ── Trigger-1: 시동 트리거 (Impulse) ──
    trigger_1:
      name: "impulse"
      min_conditions: 2
      volume_surge_mult: 1.5
      higher_low_days: 3
      volume_contraction: 0.7
      lower_tail_ratio: 0.6
      stop_loss_atr_mult: 1.5    # 타이트 손절
      target_atr_mult: 4.0
      position_pct: 0.40

    # ── Trigger-2: 확인 트리거 (Confirm) ──
    trigger_2:
      name: "confirm"
      above_sma20_days: 2
      no_new_low_days: 5
      rsi_above: 50
      stop_loss_atr_mult: 2.0    # 여유 손절
      target_atr_mult: 5.0
      position_pct: 0.40

    # ── Trigger-3: 돌파 추가 (Breakout Add) ──
    trigger_3:
      name: "breakout_add"
      new_high_days: 10
      volume_surge_mult: 1.5
      stop_loss_atr_mult: 2.0
      target_atr_mult: 6.0
      position_pct: 0.20

    # ── Trigger-4: 추세 지속 (Trend Continuation) ──
    # Grade F 우회: MA20 위에서 강한 상승 추세가 확인되면 보수적 진입 허용
    trend_continuation:
      enabled: true
      min_conditions: 5            # 7개 중 최소 충족 수
      # --- 조건 ---
      adx_min: 25                  # ADX >= 25 (강한 추세)
      rsi_range: [50, 72]          # RSI 50~72 (과매수 직전까지)
      macd_above_signal: true      # MACD > Signal (모멘텀 유지)
      volume_min_ratio: 0.8        # 거래량 >= 20일평균 x 0.8
      obv_rising_days: 5           # OBV 5일 변화 > 0
      price_above_ma60: true       # 종가 > MA60 (중기 추세)
      plus_di_above_minus: true    # +DI > -DI (방향성)
      # --- 리스크 (보수적) ---
      stop_loss_pct: 0.03          # -3% 타이트 손절
      target_atr_mult: 3.0         # 목표 ATR x 3 (풀백보다 보수적)
      position_pct: 0.50           # 정상 대비 50% 비중
      max_rsi: 72                  # RSI 72 초과 시 진입 금지 (과매수)

# ============================================================
# v3.0 Quant Engine (논문 기반 파라미터)
# ============================================================
quant_engine:
  # ── HMM 레짐 감지 (동적 적응 전략 논문) ──
  regime:
    n_states: 3
    p_accum_entry: 0.40        # Accumulation 확률 최소 40%
    features: ["ret1", "ATR_pct", "vol_z", "smart_z"]

  # ── OU 프로세스 필터 (OU+BB 논문) ──
  ou:
    window: 60
    z_entry: -0.8              # OU z-score 진입 (v7.1: -1.2→-0.8 완화, 더 넓은 진입 구간)
    half_life_min: 2           # 최소 반감기 (일)
    half_life_max: 50          # 최대 반감기 (v7.1: 25→50 완화, 느린 회귀도 허용)
    snr_min: 0.08              # Signal-to-Noise (v7.1: 0.15→0.08 완화)

  # ── 모멘텀 레이어 ──
  momentum:
    vol_surge_min: 1.2         # 거래량 서지 최소 배수
    slope_ma60_min: -0.5       # MA60 기울기 최소 (%)

  # ── Smart Money (참조 코드) ──
  smart_money:
    foreign_weight: 0.6
    inst_weight: 0.4
    rolling_sum: 3
    ma_period: 60
    min_smart_z: 0.0           # Smart Z 최소

  # ── 4단계 부분청산 (Price Action 논문) ──
  exit:
    partial_exit_r: [2, 4, 8, 10]    # R배수 목표 (25%씩)
    partial_exit_pct: 0.25           # 각 단계 청산 비율
    max_hold_days: 20                # 최대 보유일 (사용자 설정: 20일)
    trailing_stop_after_partial: true

    # v8.5: 시간 감쇠 청산 (Sinc-inspired)
    # decay_factor = 1 / (1 + decay_rate × days_held)
    # day0: 2.0 ATR → day5: 1.74 ATR → day10: 1.54 ATR → day20: 1.25 ATR
    time_decay:
      enabled: false                # v8.5: 시간 감쇠 비활성화 (PF 악화 확인)
      decay_rate: 0.03              # 감쇠율 (0.03 = 완만한 수렴, partial_sold 후에만)
      min_days: 3                   # 감쇠 시작일 (진입 초기 보호)

  # ── v4.5 Rolling Probability Gate (Adaptive Strategy) ──
  probability_model:
    enabled: true
    rolling_window: 200          # 200일 롤링 윈도우
    threshold: 0.65              # 성공 확률 >= 65% 통과
    lookahead_bars: 12           # 12일간 평균 수익률 기준
    min_avg_return: 0.01         # 1% 이상이면 "성공"

  # ── Walk-Forward 검증 (데이터 스누핑 논문) ──
  walk_forward:
    train_days: 504            # 2년
    test_days: 126             # 6개월
    step_days: 126             # 6개월씩 이동

  # ── v4.5 Bootstrap 검증 (Adaptive Strategy) ──
  bootstrap:
    enabled: true
    n_iterations: 1000           # Bootstrap 반복 횟수
    block_size: 10               # Block Bootstrap 블록 크기
    seed: 42                     # 재현성 시드
    metrics: ["sharpe", "total_return", "win_rate"]

  # ── v4.6 Monte Carlo 시뮬레이션 ──
  monte_carlo:
    enabled: true
    n_simulations: 1000          # 시뮬레이션 횟수
    ruin_threshold_pct: -50.0    # 파산 임계값 (자본 -50%)
    seed: 42                     # 재현성 시드

# ============================================================
# 백테스트 설정
# ============================================================
backtest:
  start_date: "2023-02-16"
  end_date: "2026-02-14"
  initial_capital: 30000000      # 3천만원 (사용자 설정)
  max_risk_pct: 0.02             # v8.1: 1.5%→2.0% (균형 최적)
  max_positions: 5               # v8.1: 4→5 (동시 포지션 확대)
  max_single_position_pct: 0.40
  max_portfolio_risk_pct: 0.08   # v8.1: 6%→8% (균형 최적)
  # 거래 비용 (현실 반영 v8.2)
  commission_rate: 0.00015      # 수수료 0.015% (매수+매도 각각, 온라인 할인 증권사)
  slippage_rate: 0.001          # 슬리피지 0.10% (기본, 저가주는 동적 증가)
  tax_rate: 0.0018              # 증권거래세 0.18% (매도 시만, 2025년 기준)
  dynamic_slippage: true        # 저가주 동적 슬리피지 (가격 역비례)
  slippage_price_ref: 10000     # 기준가 1만원 (이하 슬리피지 증가)
  trailing_stop_atr_mult: 2.0
  partial_take_profit_pct: 0.50
  trend_exit_consecutive_days: 3

# ============================================================
# 업종별 Forward PER 참고 범위
# ============================================================
sector_per:
  반도체: 15.0
  자동차: 7.0
  배터리: 25.0
  바이오: 30.0
  은행: 5.5
  증권: 8.0
  화학: 10.0
  철강: 6.0
  유통: 12.0
  IT: 18.0
  건설: 7.0
  조선: 12.0
  통신: 10.0
  식품: 14.0
  기타: 11.0

# ============================================================
# v4.5 섹터 분류 체계 (Adaptive Strategy — 15개 섹터)
# ============================================================
sector_classification:
  enabled: true
  max_per_sector: 1               # 동일 섹터 최대 1종목 (분산 투자)

  # 15개 섹터 정의 + 대표 키워드/업종명 매핑
  # 종목의 업종명이 keywords 중 하나를 포함하면 해당 섹터로 분류
  sectors:
    반도체:
      keywords: ["반도체", "메모리", "파운드리", "팹리스"]
    자동차:
      keywords: ["자동차", "완성차", "자동차부품"]
    배터리:
      keywords: ["배터리", "2차전지", "이차전지", "양극재", "음극재", "전해질", "분리막"]
    바이오:
      keywords: ["바이오", "제약", "의약", "신약", "진단"]
    금융:
      keywords: ["은행", "증권", "보험", "금융", "캐피탈", "카드"]
    화학:
      keywords: ["화학", "석유화학", "정유", "화학물질"]
    철강금속:
      keywords: ["철강", "비철금속", "금속", "알루미늄"]
    유통소비:
      keywords: ["유통", "백화점", "면세", "여행", "항공", "호텔", "음식료", "식품"]
    IT_SW:
      keywords: ["소프트웨어", "IT서비스", "클라우드", "SaaS", "플랫폼", "게임", "인터넷"]
    IT_HW:
      keywords: ["전자부품", "디스플레이", "통신장비", "광학", "LED", "PCB"]
    건설:
      keywords: ["건설", "토목", "건축", "시멘트", "레미콘"]
    조선해운:
      keywords: ["조선", "해운", "선박"]
    통신미디어:
      keywords: ["통신", "미디어", "방송", "엔터테인먼트", "콘텐츠"]
    에너지:
      keywords: ["전력", "가스", "에너지", "태양광", "풍력", "신재생"]
    기타:
      keywords: []                # 어디에도 매칭 안 되면 기타

  # 섹터별 비중 배분 (Adaptive Strategy)
  allocation:
    best: 0.45                    # 1순위 종목
    reserve1: 0.30                # 2순위 종목
    reserve2: 0.25                # 3순위 종목

# ============================================================
# v11.0 RSS 테마 스캐너 (RSS + Perplexity 하이브리드)
# ============================================================
theme_scanner:
  enabled: true
  rss_feeds:
    - url: "https://news.google.com/rss/search?q=%EC%A3%BC%EC%8B%9D+%ED%85%8C%EB%A7%88&hl=ko&gl=KR"
      name: "구글뉴스_주식테마"
    - url: "https://news.google.com/rss/search?q=%EC%A6%9D%EC%8B%9C+%EA%B8%89%EB%93%B1&hl=ko&gl=KR"
      name: "구글뉴스_급등"
    - url: "https://www.hankyung.com/feed/finance"
      name: "한경_증권"
    - url: "https://rss.donga.com/economy.xml"
      name: "동아_경제"
  max_articles: 50              # 피드당 최대 기사 수
  dedup_hours: 24                # 같은 테마 재알림 방지 시간
  max_age_hours: 48              # 기사 최대 허용 나이 (이보다 오래된 기사 무시)

# ============================================================
# v3.1 News Gate (L-1 이벤트 드리븐 레이어)
# ============================================================
news_gate:
  enabled: true
  version: "v3.2"

  # ── v3.2 뉴스 스코어 부스트 (Zone Score 가산) ──
  score_boost:
    grade_a: 0.15              # A급 확정 공시 → +0.15
    grade_b: 0.08              # B급 신뢰 루머 → +0.08
    living_issue_high: 0.05    # 고영향(8+) 살아있는 이슈 → +0.05/건
    living_issue_normal: 0.03  # 중영향(5~7) 살아있는 이슈 → +0.03/건
    earnings_beat: 0.08        # 어닝 서프라이즈 예상(beat) → +0.08
    earnings_growth: 0.05      # 고성장(YoY 20%+) in_line → +0.05
    pre_earnings_window: 0.05  # 실적 발표 30일 이내 → +0.05
    positive_cluster: 0.03     # 긍정 뉴스 3건+ → +0.03
    max_boost: 0.30            # 최대 부스트 한도

  # ── 뉴스 부스트 + Trend Continuation 연동 ──
  trend_cont_integration:
    boost_threshold_relax: 0.08   # 이 부스트 이상이면 TC min_conditions -1
    boost_threshold_ratio_up: 0.10 # 이 부스트 이상이면 TC 비중 x1.4
    boost_threshold_rr_relax: 0.10 # 이 부스트 이상이면 TC RR 1.2→1.0

  # ── A등급: 확정 공시 → 파라미터 조정 후 즉시 필터 ──
  grade_a:
    rr_min: 1.2                    # 손익비 1.7 → 1.2로 완화
    rsi_entry_max: 65              # RSI 70 → 65로 완화
    position_size_pct: 3           # 대형주 3%
    position_size_pct_small_cap: 2 # 소형주 2%
    max_gap_up_pct: 15             # 갭업 15% 이상 추격 금지
    max_hold_days: 3               # 이벤트 포지션 최대 3일
    settlement_strength_floor: 95  # 체결강도 95 미만 시 청산
    max_concurrent_positions: 2    # 동시 이벤트 포지션 2개 이하

  # ── B등급: 루머/미확인 → 관찰 리스트 ──
  grade_b:
    action: "watchlist"
    monitor_days: 14
    upgrade_trigger: "grade_a"     # 확정 시 A등급 승격

  # ── C등급: 추측/테마 → 무시 ──
  grade_c:
    action: "ignore"

  # ── 목표가 계산 ──
  target:
    target_1_rr: 1.0               # 반익 (RR 1:1)
    target_2_rr: 2.0               # 전량 청산 (RR 1:2)
    stop_loss_method: "atr"        # atr / fixed_pct
    stop_loss_atr_mult: 1.5

# ============================================================
# v3.1 Smart Money v2 (매집 3단계 + OBV 다이버전스)
# ============================================================
smart_money_v2:
  # ── 매집 단계 임계값 ──
  inst_net_buy_days: 5             # 기관 순매수 최소 연속일 (Phase2)
  foreign_net_buy_days: 5          # 외국인 순매수 최소 연속일 (Phase2)
  inst_net_buy_strong_days: 10     # 기관+외국인 동시 순매수 (Phase3)
  phase3_vol_ratio: 3.0            # Phase3 거래량 폭발 배수
  ma120_support_buffer: 0.03       # 120MA 지지 확인 버퍼 (3%)

  # ── OBV 다이버전스 ──
  obv_divergence_lookback: 30      # 다이버전스 스캔 기간 (일)
  obv_slope_threshold: 0.0         # 기울기 판정 최소값

  # ── SmartZ 점수 가감 ──
  bonus_phase1: 5                  # Phase1 (초기 매집): +5
  bonus_phase2: 10                 # Phase2 (중기 매집): +10
  bonus_phase3: 15                 # Phase3 (점화): +15
  penalty_dump: -20                # 투매 감지: -20
  penalty_mild: -10                # 경미한 이탈: -10

# ============================================================
# v4.1 적응형 청산 시스템 (Adaptive Exit)
# ============================================================
# 문제: Impulse -3% 고정 손절이 건강한 조정도 잘라버림
# 해결: 조정 건강도 평가 → 동적 손절 조정
adaptive_exit:
  enabled: true

  # ── 조정 건강도 배점 (총 100점) ──
  weight_ma20_support: 15       # MA20 지지
  weight_ma60_support: 10       # MA60 지지
  weight_adx_trending: 12       # ADX >= 25
  weight_di_positive: 10        # +DI > -DI
  weight_obv_intact: 15         # OBV 유지/상승
  weight_volume_declining: 10   # 거래량 감소
  weight_inst_flow: 8           # 기관 수급
  weight_foreign_flow: 8        # 외국인 수급
  weight_rsi_healthy: 7         # RSI 30~70
  weight_pullback_depth: 5      # 조정 깊이

  # ── 분류 임계값 ──
  healthy_threshold: 65         # >= 65: 건강한 조정 → 손절 완화
  caution_threshold: 40         # >= 40: 주의 → 현행 유지
  dangerous_threshold: 25       # >= 25: 위험 → 즉시 청산
  # < 25: 긴급 → 시장가 청산

  # ── 적응형 손절 파라미터 ──
  healthy_stop_mult: 2.0        # 건강: ATR*2 기반 넓은 손절
  caution_stop_mult: 1.5        # 주의: ATR*1.5
  dangerous_stop_pct: 0.02      # 위험: -2% 타이트
  ma20_stop_buffer: 0.015       # MA20 아래 1.5% 버퍼
  max_healthy_pullback_pct: 0.08  # 건강한 조정 최대 허용 -8%

# ============================================================
# v4.1 일일 보유 점수 (Daily Hold Scorer)
# ============================================================
daily_hold_scorer:
  enabled: true

  # ── 판단 임계값 ──
  strong_hold_threshold: 70     # >= 70: 강력 보유
  hold_threshold: 50            # >= 50: 보유 유지
  tighten_threshold: 30         # >= 30: 경계 (손절 강화)
  # < 30: 청산

  # ── strong_hold 시 파라미터 조정 ──
  strong_hold_stop_mult: 1.5    # 손절 1.5배 완화
  strong_hold_days_bonus: 5     # 보유일 +5일 연장
  strong_hold_trailing_mult: 1.3  # 트레일링 1.3배 넓게

  # ── tighten 시 파라미터 조정 ──
  tighten_stop_mult: 0.6        # 손절 0.6배 강화
  tighten_trailing_mult: 0.7    # 트레일링 0.7배 타이트

# ============================================================
# v4.0 라이브 트레이딩 설정
# ============================================================
live_trading:
  enabled: true                     # 2026-03-02 활성화 — 텔레그램 "정지"로 OFF
  mode: "real"                      # "paper" (모의) / "real" (실전)

  # v5.0 일일 스케줄 (KST) — 한국장 준비 ~ 미장 마감
  schedule:
    # 🇺🇸 미장 마감 + 🇰🇷 한국장 준비
    daily_reset: "00:00"
    us_close_collect: "06:10"       # 미장 마감 데이터 수집 (yfinance)
    macro_collect: "07:00"          # 한국 매크로 수집
    news_briefing: "07:20"          # 뉴스 스캔 (Perplexity API)
    morning_briefing: "07:30"       # 📱 1발: 장전 마켓 브리핑
    trade_prep: "08:20"             # 매매 준비 (토큰+공휴일+확정)

    # 🇰🇷 한국장 운영
    buy_execution: "09:02"
    monitor_start: "09:10"
    monitor_end: "15:20"
    sell_execution: "15:25"

    # 📊 장중 수급 스냅샷 (1일 4회)
    supply_snapshot_1: "09:30"      # 개장 30분 외국인 방향
    supply_snapshot_2: "11:00"      # 오전장 수급 중간점검
    supply_snapshot_3: "13:30"      # 오후장 전환 체크
    supply_snapshot_4: "15:00"      # 마감 직전 최종 수급

    # 🇰🇷 장마감 + 데이터 업데이트
    close_data_collect: "15:40"     # 종가 데이터 수집 (pykrx)
    csv_update: "16:00"             # CSV 업데이트 (FDR)
    parquet_update: "16:10"         # parquet 증분
    indicator_calc: "16:20"         # 기술적 지표 재계산
    data_verify: "16:30"            # 데이터 검증 (NaN)

    # 🌙 수급 확정 + 스캔 + 리포트
    supply_final: "18:20"           # 수급 최종 확정 (18:10 후)
    evening_scan: "18:40"           # 내일 매수 후보 스캔
    evening_briefing: "19:00"       # 📱 2발: 장마감 리포트
    eod_journal: "19:30"            # 업무일지 + 아카이브

  # 장중 수급 모니터링 설정
  supply_monitor:
    enabled: true
    snapshot_tickers: "watchlist"    # "held" / "watchlist" / "all_pipeline"
    alert_enabled: true
    alert_conditions:
      direction_flip: true          # 외국인 매수→매도 전환 시 알림
      large_volume_pct: 0.001       # 시총 대비 0.1% 이상 순매수/매도
      dual_sell_threshold: 100000   # 외국인+기관 동시 순매도 10만주
      snapshot_change_pct: 50       # 이전 스냅샷 대비 50% 급변

  # 주문 설정
  order:
    default_type: "limit"           # limit / market
    slippage_ticks: 2               # 지정가 슬리피지 (2틱 위/아래)
    max_retry: 3                    # 주문 실패 시 재시도
    retry_delay_sec: 5
    cancel_unfilled_after_sec: 300  # 5분 미체결 시 취소

  # 포지션 제한
  position:
    max_positions: 5                # 서보성 원칙: 보유 종목 5개 이하 집중
    max_single_pct: 0.40            # 단일 종목 최대 40%
    max_portfolio_risk_pct: 0.06
    initial_capital: 30000000       # 3천만원 (사용자 설정)
    cash_reserve_pct: 0.25          # 서보성 원칙: 현금 비중 25% 항상 유보 (3~4년 주기 폭락 대비)
    # 분할매수 비율 (서보성 원칙: 1회 올인 금지)
    split_buy:
      entry_1st: 0.50              # 1차 진입: 배정 비중의 50%
      entry_2nd: 0.30              # 2차 추가 (눌림목 확인 후): 30%
      entry_3rd: 0.20              # 3차 확인 (추세 확정 후): 20%

  # 안전장치
  safety:
    max_daily_loss_pct: -0.03       # 일일 -3% 매매 중단
    max_total_loss_pct: -0.10       # 총 -10% 긴급 청산
    stop_signal_file: "STOP.signal"
    reboot_trigger_file: "reboot.trigger"
    emergency_sell_type: "market"   # 긴급 청산은 시장가

  # 모니터링
  monitor:
    interval_sec: 60                # 1분 간격
    trailing_check: true
    partial_exit_check: true
    kis_sync_interval_sec: 1800     # 30분마다 KIS 실잔고 동기화
    forced_liquidation_before: "15:15"  # 만기(max_hold_days) 도래 종목 장 마감 전 강제청산

  # 주간 보고
  weekly_report:
    enabled: true
    day: "friday"                   # 금요일 장마감 후 주간 성과 텔레그램 발송

# ============================================================
# v4.7 기하학적 퀀트 보조 레이어 (L7 Geometric v2.0)
# ============================================================
# 10지표 × 7프로파일 체제. Approach A/B/C 3계층.
# 기존 파이프라인의 보조 확인 레이어로 사용.
geometric_engine:
  enabled: true
  profile: "default"                # default/reversal/breakout/capitulation/bull/bear/sideways

  # ── Approach A: 구조적 패턴 ──
  harmonic_tolerance: 0.03          # 피보나치 비율 허용 오차 (3%)
  zigzag_pct: 3.0                   # ZigZag 전환 기준 (%)
  min_bars: 5                       # 피벗 간 최소 봉 수
  elliott_zigzag_pct: 3.0           # 엘리어트용 ZigZag
  elliott_min_bars: 3               # 엘리어트용 최소 봉 수
  slope_periods: [5, 10, 20, 60]    # 각도 분석 기간 리스트

  # ── Approach B: 에너지 수렴 ──
  squeeze:
    bb_period: 20
    bb_std: 2.0
    kc_period: 20
    kc_mult: 1.5

  curvature:
    ema_span: 20
    window: 10

  confluence:
    zigzag_pct: 5.0
    bin_pct: 0.5
    min_count: 3

  # ── Approach C: 극단 회귀 ──
  mean_reversion:
    periods: [20, 60, 120]

  volume_climax:
    spike_mult: 3.0
    exhaust_bars: 5

  band_breach:
    bb_period: 20
    bb_std: 2.0
    lookback: 25

  # ── L7 보조 레이어 파라미터 ──
  lookback: 200                     # 분석 구간 (봉 수)
  min_confidence: 30                # 시그널 발생 최소 신뢰도 (%)
  confidence_boost: 0.10            # 매수 확인 시 trigger_confidence +10%
  confidence_penalty: 0.05          # 매도 경고 시 trigger_confidence -5%

# ============================================================
# v5.0 Sci-CoE 합의 엔진 (Consensus Engine)
# ============================================================
# Sci-CoE 논문(2026.02.13)의 기하학적 합의 개념 적용.
# 기존 AND 파이프라인은 100% 유지, consensus_mode로 토글.
consensus_engine:
  enabled: true                       # 합의 모드 활성화
  tau: 0.8                            # 합의 임계값 (80% 이상 통과 = 고합의)
  min_voters: 4                       # 최소 투표 레이어 수
  grade_thresholds:
    strong: 0.6                       # >= 0.6: strong
    moderate: 0.4                     # >= 0.4: moderate
    weak: 0.2                         # >= 0.2: weak
                                      # < 0.2: reject
  anchor:
    enabled: true                     # 앵커 학습 활성화
    db_path: "data/anchors.json"      # 앵커 DB 파일 경로
    min_success_pnl_pct: 3.0          # 성공 사례 최소 수익률 (%)
    min_failure_pnl_pct: -2.0         # 실패 사례 최소 손실률 (%)
    auto_update: true                 # 백테스트 후 자동 앵커 업데이트

  bon_selector:
    enabled: true                     # BoN 프로파일 자동 선택
    cache_ttl_bars: 20                # 캐시 유효 봉 수

# ============================================================
# v6.0 Martin Momentum (논문: Richard J. Martin, 2023)
# ============================================================
# EMA2 필터 + Dead Zone + Sigmoid 활성화 + 변동성 정규화
martin_momentum:
  enabled: true
  n_fast: 8                           # Fast EMA 기간
  n_slow: 24                          # Slow EMA 기간
  epsilon: 0.05                       # Dead Zone 임계값 (v7.1b: 0.3→0.05, 평균회귀 전략과 dead zone 충돌 해소)
  sigmoid_k: 5.0                      # Sigmoid 민감도
  min_confidence: 0.15                # 최소 신뢰도 (v7.1: 0.3→0.15 완화)
  vol_normalization:
    enabled: true
    target_sigma: 0.02                # 목표 일간 변동성 (2%)
    max_weight: 2.0                   # 최대 비중 배수
    min_weight: 0.3                   # 최소 비중 배수
  optimal_hold:
    enabled: true
    max_days: 30                      # 최적 보유기간 상한
    min_days: 5                       # 최적 보유기간 하한

# ============================================================
# v6.0 RTTP 뉴스 신호 (논문: Hui et al., WWW '26)
# ============================================================
# 소스 권위 가중 + 인게이지먼트 깊이 5단계 + LLM 합성
rttp_news:
  enabled: true
  source_weights:
    DART: 1.0
    BLOOMBERG: 0.95
    BROKERAGE: 0.80
    NEWSPAPER: 0.70
    PORTAL: 0.50
    COMMUNITY: 0.15
  engagement_levels:
    L5_inst: 5.0                      # 기관 순매수
    L4_volume: 3.5                    # 거래량 급증
    L3_report: 2.0                    # 증권사 리포트
    L2_search: 1.0                    # 검색량 증가
    L1_sns: 0.3                       # SNS/커뮤니티
  recall_monitoring:
    enabled: true
    threshold: 0.5                    # Recall@K 50% 미만 → 재조정
    window: 100                       # 모니터링 윈도우
  llm_synthesis:
    enabled: false                    # 기본 비활성화 (Claude API 비용)
    model: "claude-sonnet-4-5-20250929"
    max_beneficiaries: 5
    daily_call_limit: 100

# ============================================================
# v6.0 극한 변동성 탐지 (논문: Alparslan & Kim, 2021)
# ============================================================
# ATR/거래량/일간 범위로 극한 변동성 탐지 + 방향 판별
extreme_volatility:
  enabled: true
  atr_ratio_threshold: 3.0           # 현재 ATR / 60일 평균 ATR
  vol_ratio_threshold: 5.0           # 현재 거래량 / 60일 평균 거래량
  daily_range_threshold: 10.0        # (고가-저가)/종가 * 100 (%)
  capitulation:
    min_down_days: 3                  # 투매 판정 최소 연속 하락일
    volume_climax_mult: 3.0           # 거래량 클라이맥스 배수
    rsi_extreme: 20                   # RSI 극단 과매도
    min_score: 70                     # Capitulation 최소 점수
  allow_ambiguous: false              # ambiguous 방향 시 시그널 허용 여부

# ============================================================
# v6.0 WaveLSFormer 정규화 (논문: WaveLSFormer, 2024)
# ============================================================
# 리스크 예산 정규화 + Sharpe 보유점수 + Peer 분석
wavelsformer:
  risk_normalization:
    enabled: true
    target_daily_vol: 0.02              # 목표 일간 변동성 (2%)
    lookback: 60                        # 실현 변동성 계산 기간
    max_scale: 2.0                      # 최대 포지션 스케일
    min_scale: 0.3                      # 최소 포지션 스케일
  sharpe_hold_scoring:
    enabled: true
    bonus_threshold: 1.5                # Sharpe > 1.5 → +3점
    moderate_threshold: 0.5             # Sharpe > 0.5 → +1.5점
    penalty_threshold: -0.5             # Sharpe < -0.5 → -2점
    lookback: 20                        # Sharpe 계산 기간
  peer_analysis:
    enabled: false                      # 기본 비활성화 (연산 비용)

# ============================================================
# v7.0 TGCI (TRIX Golden Cross Indicator)
# ============================================================
tgci:
  golden_cross_pts: 35           # TRIX 골든크로스 기본 점수
  slope_bonus_max: 8             # 기울기 보너스 최대
  rsi_optimal_range: [40, 60]    # RSI 최적 매수 구간
  volume_explosion_mult: 2.5     # 거래량 폭발 기준 배수
  bb_overheat_threshold: 0.95    # 볼린저 과열 임계값
  setup_min_score: 55            # SETUP 시그널 최소 TGCI 점수

# ============================================================
# v7.0 Master Controller (서브시스템 가중합산)
# ============================================================
master_controller:
  weights:
    pipeline: 0.40               # 7-Layer 파이프라인 통과 점수
    tgci: 0.20                   # TGCI 독립 점수
    smart_money: 0.15            # 수급 분석 점수
    regime: 0.15                 # 레짐 적합성 점수
    geometric: 0.10              # 기하학 엔진 점수
  thresholds:
    strong_buy: 75               # STRONG_BUY 최소 점수
    buy_conservative: 65         # BUY(보수적) 최소 점수
    buy_aggressive: 50           # BUY(공격적) 최소 점수
    watch: 40                    # WATCH 최소 점수
  min_contributing_systems:
    conservative: 3              # 보수적 진입 최소 서브시스템 수
    aggressive: 2                # 공격적 진입 최소 서브시스템 수

# ════════════════════════════════════════════════════════════
# 공매도 마스터 스위치 (v10.1 Long-only 순수화)
# false = 공매도 데이터가 스코어링/매매에 영향 안 줌
# true  = 기존 v8.3 동작 (G4 게이트, SD교차, S5 점수, Regime Profile)
# ════════════════════════════════════════════════════════════
use_short_selling_filter: false    # KRX 공매도 데이터 제공 중단 (2026-04)

# ════════════════════════════════════════════════════════════
# v8.3 공매도 체제 캘린더 + Regime Profile
# (use_short_selling_filter: false    # KRX 공매도 데이터 제공 중단 (2026-04) → 캘린더+프로파일 활성, 데이터 수집은 항상)
# ════════════════════════════════════════════════════════════
short_selling_calendar:
  # status: "active" = 정상 공매도, "banned" = 금지, "reopened" = 금지 후 재개장
  - { start: "2019-01-01", end: "2020-03-15", status: "active" }
  - { start: "2020-03-16", end: "2021-05-02", status: "banned" }    # COVID 금지
  - { start: "2021-05-03", end: "2023-11-05", status: "active" }
  - { start: "2023-11-06", end: "2025-03-30", status: "banned" }    # 전면 금지
  - { start: "2025-03-31", end: "2099-12-31", status: "reopened" }   # 재개장 (별도 프로파일)

regime_profiles:
  # 정상 공매도 시 (과거 검증된 파라미터)
  short_selling_active:
    max_positions_scale: 0.6        # max_positions × 0.6 (5→3)
    min_rr_ratio: 2.0               # 손익비 하한 상향 (1.5→2.0)
    position_scale_mult: 0.7        # 포지션 크기 70%
    stop_loss_scale: 1.0            # 손절 유지 (기존 dead code였으므로 1.0이 baseline)
    max_hold_days_scale: 0.6        # 최대 보유일 축소 (30→18)
    sa_floor: 0.30                  # SA floor 낮춤 → hostile 도달 가능
    min_regime_scale: 0.0           # hostile만 차단 (정상장 caution 진입 허용)

  # 공매도 금지 시 (기본 파라미터 유지)
  short_selling_banned:
    max_positions_scale: 1.0
    min_rr_ratio: 1.5
    position_scale_mult: 1.0
    stop_loss_scale: 1.0
    max_hold_days_scale: 1.0
    sa_floor: 0.55                  # 기존 높은 floor 유지
    min_regime_scale: 0.0           # hostile만 차단

  # 재개장 (금지 후 공매도 재개 — 최고 방어 모드)
  short_selling_reopened:
    max_positions_scale: 0.6        # max_positions × 0.6 (5→3)
    min_rr_ratio: 2.0               # 손익비 하한 상향
    position_scale_mult: 0.7        # 포지션 크기 70%
    stop_loss_scale: 0.8            # 손절 20% 타이트
    max_hold_days_scale: 0.6        # 최대 보유일 축소
    sa_floor: 0.30                  # hostile 도달 가능
    min_regime_scale: 0.75          # neutral 이상만 진입 (caution 차단)
    pullback_max: 2.5               # G2 상한 축소 (4.0→2.5) — deep pullback 차단

# ════════════════════════════════════════════════════════════
# v8.2 Market Regime Gate (7D 시장 체제 감지)
# "지금이 우리 시스템이 작동하는 시장인가?"
# ════════════════════════════════════════════════════════════
regime_gate:
  enabled: true
  lookback: 20                     # 체제 판단 기본 lookback (일)

  # 1. Market Breadth (추세 정렬 종목 비율)
  breadth:
    favorable_pct: 0.55            # 55%+ 종목 추세 정렬 → favorable
    hostile_pct: 0.35              # 35%- → hostile

  # 2. Foreign Flow (외국인 수급 방향)
  foreign_flow:
    lookback: 20                   # 외국인 방향 판단 기간
    strong_buy_ratio: 0.60         # 60%+ 종목 외국인 순매수 → buy day
    weak_sell_ratio: 0.40          # 40%- → sell day

  # 3. Volatility Regime (변동성 환경)
  volatility:
    short_lookback: 10             # 단기 변동성 기간
    long_lookback: 60              # 장기 변동성 기준
    spike_threshold: 1.5           # 단기/장기 비율 1.5x+ → hostile

  # 4. Self-Adaptive (곱셈 계수 — 최근 거래 성공률)
  self_adaptive:
    window: 15                     # 최근 15거래 롤링 (빠른 반응/회복)
    min_trades: 8                  # 8건 이상 쌓여야 활성화
    floor: 0.55                    # SA=0일 때 base의 55% 반영 (caution 유지, 사망나선 방지)
    hostile_winrate: 0.25          # 25% 이하 → SA=0.0 (×0.30)
    caution_winrate: 0.35          # 35% 이하 → caution 방향
    neutral_winrate: 0.50          # 50% 이하 → neutral 방향

  # 체제 판정 임계값 (composite = base × sa_mult, 0~4 범위, L4 매크로 추가)
  # v8.3.1 대비 +0.1 — 매크로 가산 보너스 반영
  thresholds:
    favorable: 2.3                 # >= 2.3: 전체 포지션 (scale=1.0)
    neutral: 1.6                   # >= 1.6: 75% 포지션
    caution: 0.8                   # >= 0.8: 50% 포지션
                                   # < 0.8: 신규 진입 차단 (scale=0.0)

# ════════════════════════════════════════════════════════════
# v8.5.1 동시 손실 한도 (Portfolio Stop)
# 보유 포지션 평균 미실현 손익이 임계값 이하면 신규 진입 중단
# ════════════════════════════════════════════════════════════
portfolio_stop:
  enabled: false                     # v8.5.1: 백테스트 결과 역효과 (PF 악화) → 비활성
  avg_pnl_threshold: -0.03          # 평균 -3% 이하면 신규 매수 중단

# ════════════════════════════════════════════════════════════
# v8.1 Gate + Score Hybrid Pipeline (Tuned)
# "포물선 초점에 진입하여 추세를 먹는다"
# ════════════════════════════════════════════════════════════
v8_hybrid:
  enabled: true  # true면 v8 파이프라인, false면 기존 v7

  # ─── Phase 1: Hard Gates (AND) ───
  gates:
    trend:
      ma_fast: 60                # MA60 > MA120 (중기 > 장기)
      ma_slow: 120
      adx_min: 14                # v8.5: 역도출 (91건 5%=14.0, 18→14)
    pullback:
      min_atr_pullback: 0.8      # v8.1 원복 (0.3→0.8, 적절한 조정 깊이 요구)
      max_atr_pullback: 4.0      # v8.0 원본 유지
      high_lookback_days: 20
    overheat:
      max_52w_ratio: 0.95        # v8.5: 역도출 (91건 95%=0.945, 0.92→0.95)

  # ─── Phase 2: Scoring Engine (가중합) ───
  scoring:
    weights:
      energy_depletion: 0.30     # S1: 매도 에너지 소진
      valuation: 0.20            # S2: 밸류에이션
      ou_reversion: 0.20         # S3: OU 평균회귀
      momentum_decel: 0.15       # S4: 모멘텀 감속 (martin_dead_zone 대체)
      smart_money: 0.15          # S5: 수급/스마트머니

    energy:
      rsi_optimal_center: 45
      rsi_optimal_range: [38, 52]
      vol_ratio_threshold: 0.7   # 5MA/20MA < 0.7 → 관심 철수
      bb_position_optimal: [0.05, 0.30]

    valuation:
      per_discount_threshold: 0.8
      pbr_percentile_good: 30
      forward_per_discount: 0.85

    ou:
      z_score_optimal: [-2.5, -1.0]
      z_score_weak: [-1.0, -0.5]
      half_life_fast: [3, 15]
      half_life_medium: [15, 30]
      theta_strong: 0.05

    momentum:
      slope_window_long: 20
      slope_window_short: 5

    smart_money:
      obv_trend_days: 5
      drs_safe_threshold: 0.3
      drs_neutral_threshold: 0.5
      # v12.3 수급 업그레이드 — 연속일 구간별 채점 + 다이버전스
      consecutive_thresholds:
        - [8, 1.00]    # 8일+ 확신 매집
        - [5, 0.75]    # 5-7일 강한 매집
        - [3, 0.50]    # 3-4일 추세 형성
        - [1, 0.25]    # 1-2일 관심 시작
      divergence_bonus: 0.10    # 기관매집 (외인매도+기관매수) 보너스
      divergence_penalty: -0.05  # 쌍매도 패널티

    grade_cutoffs:
      A: 0.65                    # 풀 사이즈 진입 (fundamental 미존재 보정)
      B: 0.50                    # v8.1 원복 (0.42→0.50, B등급 기준 강화)
      C: 0.35                    # 워치리스트만 (진입 불가)

    # v8.5: 비율 지표 부스트 (91건 시작점 역도출)
    # Phase 2 → 2.5 에서 zone_score에 가산, C→B 등급 승격 가능
    # 최소 2/3 조건 동시 충족 시에만 적용 (선택적)
    ratio_boost:
      enabled: true
      max_boost: 0.10            # 최대 부스트 (3/3 충족: +0.10, 2/3: +0.067)
      min_conditions: 2          # 최소 충족 조건 수 (2/3 이상)
      bb_atr_optimal: [3.0, 8.0] # R1: BB/ATR 비율 적정 범위 (91건 중앙 4.05)
      # R2: 조용한 매집 임계값
      quiet_vol_surge_max: 1.3          # 거래량 급등 상한
      quiet_vol_contraction_max: 1.5    # 거래량 수축 상한
      quiet_price_trend_max: 0.05       # 5일 가격변동 상한 (5%)
      # R3: OBV 선행 임계값
      obv_lead_price_max: 0.03          # OBV 양성 + 가격 미상승 기준 (3%)

  # ─── Phase 3: Triggers (OR) ───
  triggers:
    volume_rsi:
      vol_multiplier: 0.3        # v8.5: 역도출 (91건 5%=0.36, 1.5→0.3 — 조용한 시작점 포착)
      rsi_threshold: 45           # RSI 교차 기준
      rsi_range: [30, 80]         # v8.5: 역도출 (91건 90%=[33,78], [35,55]→[30,80])
    sar_reversal:
      enabled: true                # T4: SAR 하강→상승 반전 트리거

  # ─── Position Sizing ───
  position:
    A_grade_pct: 0.20            # A등급: 자본의 20%
    B_grade_pct: 0.10            # B등급: 자본의 10%
    stop_loss_atr: 2.0           # 손절: -2 ATR
    target_atr_A: 5.0            # A등급 타겟: +5 ATR
    target_atr_B: 3.5            # B등급 타겟: +3.5 ATR
    min_rr_ratio: 1.5            # 최소 손익비
    sar_trailing:
      enabled: true              # SAR 기반 동적 트레일링 스톱
      buffer_atr_mult: 0.3       # SAR ± ATR×0.3 버퍼 (타이트 방지)

# ════════════════════════════════════════════════════════════
# 수급 이면 데이터 레이어 (6개)
# "가격이 오르는 이유가 진짜인지 가짜인지 구분"
# ════════════════════════════════════════════════════════════
supply_demand:
  enabled: true
  collection_time: "16:30"          # 장마감 후 수집 시각

  # ── L1: 공매도 ──
  short_selling:
    spike_threshold: 2.0            # 40일 평균 대비 배수 → 위험
    balance_danger_pct: 3.0         # 상장주식수 대비 3%+ → 모니터링
    lending_increase_warn: 20       # 대차잔고 5일 변화율 20%+ → 경고
    overheated_halt: true           # 과열종목 지정 시 자동매매 중단
    # ── SH1~SH4 시그널 설정 (collect_short_selling.py) ──
    signals:
      sh1_threshold: 0.50            # SH1: 5일 변화율 50%+ → 급증
      sh3_percentile: 0.90           # SH3: 역대 90%ile → 극단
    scoring:
      sh4_market_ratio: 1.5          # SH4 시장 배수 (미사용 예비)
      regime_penalty_sh4: 5          # SH4 트리거 시 REGIME -5점

  # ── L3: 체결강도 (Phase 2) ──
  execution:
    strength_weak: 50               # 체결강도 50 미만 → 매도세 우위
    large_trade_multiple: 10        # 평균의 10배+ → 대량 체결

  # ── L5: 기관/외인 수급 ──
  investor_flow:
    foreign_consecutive_strong: 5   # 5일+ 연속 순매수 → 추세 형성
    foreign_consecutive_weak: 3     # 3일+ → 관심
    institution_20d_positive: true  # 기관 20일 누적 양전환 → 매집

  # ── 함정률 v2.0 가중치 ──
  trap_weights:
    crowd_heat: 0.25                # 군중 과열도
    short_risk: 0.20                # 공매도 위험도
    spoofing: 0.20                  # 허수호가 빈도 (Phase 3)
    execution_reverse: 0.15         # 체결강도 역전
    wash_trade: 0.10                # 자전거래 의심
    program_pressure: 0.10          # 프로그램 매도 압력

  # ── 구현 로드맵 ──
  # Phase 1 (즉시): pykrx 공매도 + 수급 → L1, L5
  # Phase 2 (2~3주): KIS 실시간 체결강도 + 프로그램 → L3, L4
  # Phase 3 (1~2개월): 호가창 허수호가 + 옵션 → L2, L6

# ════════════════════════════════════════════════════════════
# Phase 1: 장중 실시간 데이터 수집 파이프라인
# ════════════════════════════════════════════════════════════
intraday_monitor:
  enabled: true

  # ─── 수집 주기 ───
  tick_interval_sec: 60          # 1분: 보유종목 현재가 틱
  candle_interval_min: 5         # 5분: 5분봉 + 시장지수
  flow_interval_min: 10          # 10분: 투자자수급 + 업종시세

  # ─── 시장 시간 ───
  market_hours:
    premarket_start: "08:30"     # 프리마켓 (시장지수만)
    regular_start: "09:00"       # 정규장 시작
    regular_end: "15:30"         # 정규장 마감
    closing_snapshot: "15:35"    # 마감 확정 데이터

  # ─── DB 설정 ───
  db_path: "data/intraday.db"    # SQLite 파일 경로
  cleanup_days: 30               # 30일 이전 데이터 자동 삭제

  # ─── API Rate Limit ───
  rate_limit:
    max_calls_per_sec: 16        # KIS API 초당 최대 호출
    min_interval_ms: 60          # 호출 간 최소 간격 (ms)

  # ─── Phase 2: 상황보고서 ───
  situation_report:
    interval_min: 30               # 정기 보고 주기 (분)
    emergency_threshold: 0.03      # 3% 급변 시 긴급 보고
    closing_time: "15:35"          # 마감 보고서 생성 시각

  # ─── Phase 3: AI 판단 (예정) ───
  # ai_judgment:
  #   model: "claude-sonnet-4-5-20250929"
  #   max_daily_calls: 50        # 일일 최대 호출
  #   regular_calls: 30          # 정기 판단 (6회/종목 × 5종목)
  #   emergency_budget: 20       # 긴급 판단 예산

  # ─── Phase 4: 텔레그램 알림 (예정) ───
  # telegram_alerts:
  #   green_interval_min: 240    # 정기 보고 (4시간)
  #   yellow_immediate: true     # 주의 즉시 전송
  #   red_immediate: true        # 매도 즉시 전송
  #   blue_immediate: true       # 추매 즉시 전송

# ============================================================
# AI 스마트 진입 설정 (SmartEntryEngine)
# ============================================================
smart_entry:
  initial_discount_pct: 0.5      # 전일종가 대비 초기 지정가 할인율 (%)
  gap_small_pct: 0.5             # 소갭 기준 (%)
  gap_medium_pct: 1.5            # 중갭 기준 (%)
  gap_up_pct: 3.0                # 대갭 기준 (%)
  min_bid_ask_ratio: 1.3         # 진입 허용 최소 매수/매도 잔량비
  max_candle_wait_min: 15        # 5분봉 대기 시간 (분)
  order_deadline: 1030           # 주문 마감 시각 (HHMM)
  adapt_interval_sec: 120        # 적응형 정정 간격 (초)
  gap_position_scale: 0.5        # 갭업 진입 시 포지션 축소 비율
  gap_chase_limit_pct: 1.5       # 수급 강할 때 최대 추격 허용 (전일종가 +1.5%)
  # VWAP 3중 확인 시스템 (60 EMA + VWAP + MACD Histogram)
  vwap_enabled: true               # 3중 확인 활성화
  # 기관 알고 70%+가 VWAP 기준 매매. 3중 확인 = 가짜 신호 극적 감소
  # 보너스: 3/3=+3, 2/3=+2, 1/3=0, 0/3=-2 (기존 30점에 가감)

  # [채널 2] AI 두뇌 진입 보정 (BUY+high → +3점, AVOID → -3점)
  ai_brain_adjustment:
    enabled: false             # 안전장치: 기본 off
    buy_boost: 3               # AI BUY + urgency=high → +3점
    avoid_penalty: -3          # AI AVOID → -3점

  # ─── 텔레그램 승인 게이트 ───
  confirm_before_order: true       # 매수 전 텔레그램 승인 필요 (핵심!)
  approval_timeout_sec: 300        # 승인 대기 시간 (초, 5분)

  # ─── 라이브 트레이딩 안전장치 ───
  live:
    max_stocks: 5                  # 동시 매수 최대 종목수 (v3 2종목 + TOP 3종목)
    max_amount_per_stock: 5000000  # 종목당 최대 투자금 (원, 500만원 상한)
    max_total_amount: 50000000     # 전체 최대 투자금 (원, 5천만원 상한)
    kill_switch_file: "data/KILL_SWITCH"  # 이 파일 존재 시 즉시 중단
    v3_sizing_enabled: true        # v3 size_pct 기반 동적 사이징 활성화

# ============================================================
# 금요일 투매 역매수 스캐너 (Friday Dip Scanner)
# ============================================================
friday_dip:
  enabled: true
  min_rsi: 55.0              # RSI 하한 (강한 종목만)
  min_adx: 25.0              # ADX 하한 (추세 있는 종목만)
  min_drop_pct: 2.0          # 고가 대비 최소 하락률 (%)
  min_vol_ratio: 1.5         # 20일 평균 대비 거래량 배율
  require_above_sma20: true  # SMA20 위 필수
  stop_loss_pct: 1.0         # 손절 기준 (%)
  max_candidates: 5          # 최대 추천 종목 수
  min_trading_value_억: 10.0
  scan_time: "14:00"         # 스캔 시작 시각 (금요일만)
  # 모든 요일 스캔: false → 금요일만, true → 매일 (향후 확장)
  all_weekdays: false

# ============================================================
# 매도 모니터 설정
# ============================================================
sell_monitor:
  confirm_before_sell: true        # 매도 전 텔레그램 승인 필요
  use_limit_orders: true           # 지정가 매도 (+0.5%, "더 비싸게 매도" 모토)
  limit_sell_premium_pct: 0.5      # 매도 프리미엄 (%, 현재가 대비)
  approval_timeout_sec: 300        # 매도 승인 대기 시간 (초, 5분)

# ============================================================
# Timefolio 벤치마크 — 4대 전략 업그레이드
# ============================================================

# ── 전략 1: 레짐 전환 매크로 시그널 ──
regime_macro:
  lookback_days: 60
  ma20_slope_window: 5
  ma60_slope_window: 10
  transition_threshold: 0.7
  grades:
    aggressive: 75
    active: 60
    normal: 45
    defensive: 30

# ── 전략 2: 포트폴리오 배분 ──
portfolio_allocation:
  max_single_stock_pct: 15
  strategies:
    momentum: {base: 30}
    flow: {base: 25}
    event: {base: 15}
    sector: {base: 20}
    safety: {base: 10}
  regime_overrides:
    BULL: {momentum: 35, flow: 25, event: 15, sector: 20, safety: 5}
    CAUTION: {momentum: 25, flow: 25, event: 15, sector: 20, safety: 15}
    BEAR: {momentum: 10, flow: 20, event: 20, sector: 15, safety: 35}
    CRISIS: {momentum: 0, flow: 10, event: 15, sector: 10, safety: 65}

# ── 전략 3: DART 이벤트 드리븐 ──
dart_event:
  buy_keywords: ["자기주식취득", "공급계약체결", "수주", "배당"]
  watch_keywords: ["최대주주변경", "합병", "인수"]
  avoid_keywords: ["유상증자", "관리종목", "거래정지", "상장폐지"]
  rsi_overheated: 70
  flow_bonus_threshold: 0

# ── 전략 4: 앙상블 다각화 ──
ensemble:
  sources: 8
  regime_boost_enabled: true
  dart_avoid_filter: true

# ============================================================
# position_monitor — 보유종목 동적 목표가 재판정 엔진
# ============================================================
position_monitor:
  # 판정 임계값 (final_target / current_price)
  add_threshold: 1.08           # >= 1.08 → ADD (추가매수)
  hold_threshold: 1.03          # >= 1.03 → HOLD (보유 유지)
  partial_sell_threshold: 1.01  # < 1.01 → PARTIAL_SELL (부분매도)
  full_sell_threshold: 0.97     # < 0.97 → FULL_SELL (전량매도)

  # 보조 안전장치
  hard_stop_loss_pct: -8.0      # pnl < -8% 강제 FULL_SELL
  profit_take_pct: 12.0         # pnl >= 12% 최소 PARTIAL_SELL

  # 총 조정 클램핑
  total_adj_max: 0.15
  total_adj_min: -0.15

  # 1 증권사 리포트 조정
  report:
    strong_buy_adj: 0.04        # Buy + 목표가상향 → +4%
    buy_adj: 0.03               # Buy → +3%
    hold_adj: 0.0
    reduce_adj: -0.05           # 비중축소 → -5%
    sell_adj: -0.08             # Sell → -8%

  # 2 뉴스 임팩트 조정
  news:
    high_positive_adj: 0.025
    high_negative_adj: -0.04
    medium_scale: 0.6           # medium은 high의 60%
    beneficiary_adj: 0.02
    risk_adj: -0.03
    positive_keywords: ["호재","수주","급등","실적","상향","승인","계약","돌파"]
    negative_keywords: ["악재","손실","하락","조사","하향","리콜","소송","부진"]

  # 3 수급 조정
  supply:
    dual_buy_3d_adj: 0.02       # 외인+기관 3일 순매수
    foreign_only_3d_adj: 0.015
    inst_only_3d_adj: 0.01
    dual_sell_3d_adj: -0.02
    foreign_sell_3d_adj: -0.015

  # 4 MACD 조정
  macd:
    golden_cross_adj: 0.02
    dead_cross_adj: -0.03
    bearish_divergence_adj: -0.05
    bullish_divergence_adj: 0.02
    divergence_lookback: 20

  # 5 RSI 조정
  rsi:
    extreme_overbought: 75      # 이 이상 → base_target override
    override_multiplier: 1.03   # 현재가 × 1.03으로 강제
    overbought: 70
    overbought_adj: -0.02
    oversold: 30
    oversold_adj: 0.03
    near_oversold: 40
    near_oversold_adj: 0.015

  # 6 볼린저 조정
  bollinger:
    upper_breach: 100
    upper_breach_adj: 0.01
    lower_breach: 5
    lower_breach_adj: -0.05

  # 7 DART 이벤트 조정
  dart:
    tier1_buy_adj: 0.03
    tier2_adj: 0.01
    avoid_adj: -0.10

# ──────────────────────────────────────────
# 내일 추천 종목 전략 그룹 설정
# ──────────────────────────────────────────
tomorrow_picks:
  swing_slots: 3
  short_slots: 2
  swing_sources:
    - 릴레이
    - 그룹순환
    - 눌림목
    - 퀀텀
    - 동반매수
    - 이벤트촉매
    - 이벤트
    - 밸류체인
  short_sources:
    - 수급폭발
    - 세력감지
    - 매집추적
  overlap_pairs:
    - [릴레이, 그룹순환]
    - [세력감지, 매집추적]

# ============================================================
# AI Brain — Claude API 정성적 뉴스 판단 엔진
# ============================================================
ai_brain:
  enabled: true
  model: "claude-sonnet-4-5-20250929"
  max_news_items: 70          # 최대 뉴스 수
  max_stock_judgments: 50     # 최대 종목 판단 수 (커버리지 확대)
  bonus_max: 5                # scan_tomorrow_picks 최대 보너스 (±5점, AI는 참고 수준)
  daily_call_limit: 3         # 일일 API 호출 한도 (비용 안전장치)
  universe_filter: true       # 84종목 유니버스 밖 종목 필터링
  # [채널 1] AI 독립 추천 슬롯 — 비활성화 (시그널 기반 추천이 주체)
  independent_pick:
    enabled: false
    max_count: 5               # 최대 독립 추천 종목 수
    min_confidence: 0.70       # 최소 AI 신뢰도
  # [종목선정 강화] AI 섹터 필터 + 거부권 + 동적 슬롯
  stock_selection:
    sector_boost: true         # AI sector_outlook → +10/-15점 보정
    veto_avoid: true           # AI AVOID 종목 최종 추천 제외
    dynamic_slots: true        # AI 센티먼트 → 추천 수량 조절 (bullish 14 / neutral 10 / bearish 10)
    min_sources: 3             # TOP 추천 최소 소스 수 (3개 미만은 추천 제외)
    min_sources_alt_score: 70  # 소스 부족 시 이 점수 이상이면 통과 (복합 조건)
  # [채널 3] KOSPI 레짐 AI 보정 (bearish 시 하향만 적용)
  regime_adjustment:
    enabled: false             # 안전장치: 기본 off

# ============================================================
# ETF 3축 로테이션 시스템
# ============================================================
# 축1: 섹터 ETF (저격수) — 모멘텀 Top N → Smart Money → 수급
# 축2: 레버리지/인버스 (포병) — 레짐+US야간+5축
# 축3: 지수 ETF (보급부대) — KODEX200 + MSCI Korea TR
etf_rotation:
  enabled: true

  # 레짐별 비중 매트릭스 (%) — PRE_ 선행 레짐 포함
  regime_allocation:
    # 2024-2026 백테스트 기반 교정 (v13.8)
    # Gold 확대, 채권 축소 (금리 인상기 TLT 비유효), 공격 레짐 현금 축소
    BULL:       {sector: 30, leverage: 15, index: 20, gold: 10, small_cap: 10, bonds: 0, dollar: 0, cash: 15}
    PRE_BULL:   {sector: 25, leverage: 10, index: 20, gold: 10, small_cap: 5,  bonds: 5, dollar: 0, cash: 25}
    CAUTION:    {sector: 20, leverage: 0,  index: 20, gold: 15, small_cap: 0, bonds: 5, dollar: 5, cash: 35}
    PRE_BEAR:   {sector: 0,  leverage: 15, index: 0,  gold: 10, small_cap: 0, bonds: 10, dollar: 15, cash: 50}
    BEAR:       {sector: 0,  leverage: 15, index: 0,  gold: 25, small_cap: 0, bonds: 10, dollar: 10, cash: 40}
    PRE_CRISIS: {sector: 0,  leverage: 20, index: 0,  gold: 20, small_cap: 0, bonds: 5,  dollar: 15, cash: 40}
    CRISIS:     {sector: 0,  leverage: 15, index: 0,  gold: 20, small_cap: 0, bonds: 5,  dollar: 15, cash: 45}

  # 섹터 ETF 파라미터
  sector:
    max_holdings: 3              # 최대 보유 종목 수
    momentum_top_n: 5            # 모멘텀 Top N 필터
    smart_money_required: true   # Smart Money 유입 필수
    min_supply_score: 60         # 최소 수급 점수 (100점 만점)
    stop_loss_pct: -7.0          # 손절 기준 (%) — 백테스트 최적화: -5→-7 (ETF 변동성 반영)
    rotation_rank_threshold: 5   # 이 순위 밖이면 교체
    rotation_freq_days: 10       # 로테이션 주기 (거래일) — 백테스트 최적화: 1→10 (격주, PF 2.71)
    momentum_weights:            # 모멘텀 기간별 가중치
      5d: 0.2
      20d: 0.5
      60d: 0.3

  # 레버리지 파라미터
  leverage:
    stop_loss_pct: -3.0          # 손절 기준 (%)
    max_hold_days: 5             # 최대 보유일 (감가 리스크)
    min_5axis_score: 55          # 5축 최소 점수 (70→55 완화)
    us_overnight_required: true  # US Overnight 시그널 확인
    # 섹터 레버리지 (포병 → 저격 포병)
    # BULL + 모멘텀 1위 섹터에 유동성 충분한 레버리지 ETF 있으면 정밀 타격
    # 없으면 KODEX 레버리지(지수 2배) 기본값
    sector_leverage_enabled: true

    # 선행 시그널 (US Overnight → 레짐 보정)
    # KOSPI 전일종가 레짐에 US 시그널로 2~3일 선행 경보
    leading_signal:
      enabled: true
      pre_bear_threshold: 40       # 경고점수 >= 이 값 → PRE_BEAR (인버스 진입)
      pre_crisis_threshold: 60     # 경고점수 >= 이 값 → PRE_CRISIS (인버스2X)
      pre_bull_threshold: -30      # 경고점수 <= 이 값 → PRE_BULL (반등 시그널)
      weights:
        us_grade_4: 20             # MILD_BEAR 등급
        us_grade_5: 40             # STRONG_BEAR 등급
        vix_high: 15               # VIX zscore > 2.0
        vix_panic: 25              # VIX zscore > 3.0
        ewy_drop_5pct: 15          # EWY -5% 이하
        ewy_drop_8pct: 25          # EWY -8% 이하
        special_rule: 10           # 위험 특수룰 1개당
        l2_bearish: 10             # L2 상승확률 < 35%

  # 지수 ETF 파라미터
  index:
    rebalance_threshold_pct: 2.0 # 리밸런싱 임계값 (%p)

  # 리스크 관리
  risk:
    sector_overlap_block: true       # 개별주-ETF 섹터 중복 차단
    max_sector_exposure_pct: 25      # 동일 섹터 최대 노출 (%)
    max_leverage_exposure_pct: 20    # 레버리지 실질 비중 상한 (%)
    max_total_investment_pct: 90     # 최대 투자 비중 (%)
    min_cash_pct: 10                 # 최소 현금 보유 (%)
    killswitch_levels:
      - {drawdown_pct: -7,  action: close_leverage,  desc: "레버리지 전량 청산"}
      - {drawdown_pct: -10, action: close_sector,     desc: "섹터 ETF도 청산"}
      - {drawdown_pct: -15, action: close_all,         desc: "전량 현금화 + 수동모드"}
    regime_crash_rule:
      from: BULL
      to: CRISIS
      action: close_all
      desc: "BULL→CRISIS 직행 시 익일 시가 전량 청산"

  # 프레데터 모드 — "룰을 깨는 전략"
  # 1. 모멘텀 가속도: 순위 변화 속도로 "다음 1위"를 선제 매수
  # 2. 확신 집중: HIGH에 60%, MID에 30%, LOW에 10% 비대칭 배분
  # 3. 이벤트 트리거: 격주 기본 + 급등/수급폭발/레짐전환 시 즉시 대응
  predator:
    enabled: true
    accel_lookback: 5              # 순위 변화 관찰 기간 (일)
    accel_weight_recent: 0.6       # 최근 변화 가중치
    conviction_thresholds:
      HIGH: 70
      MID: 45
      LOW: 25
    conviction_weights:            # 확신도별 비중 배분 (섹터 전체 대비 %)
      HIGH: 60
      MID: 30
      LOW: 10
    max_sector_holdings: 3
    surge_threshold_pct: 5.0       # 이벤트 트리거: 일간 급등 기준 (%)
    smart_money_threshold_bil: 500 # 이벤트 트리거: 외인 누적 매수 기준 (억)
    smart_money_consecutive_days: 3

  # AI 필터 레이어 (v11)
  # 룰베이스 주문 → AI가 PASS/KILL/HOLD 판단 → 최악 매매만 걸러내기
  # 핵심: AI는 "사라"고 안 함. "사지 마라"만 할 수 있음. 공격은 룰, 방어만 AI.
  ai_filter:
    enabled: true
    model: "claude-sonnet-4-5-20250929"   # AI 모델 (비용 효율)
    # AI 개입 3가지:
    #   KILL  — 룰이 매수라는데 위험 감지 → 매수 보류
    #   HOLD  — 룰이 교체라는데 기존 추세 강함 → 교체 연기
    #   WARNING — 룰에 없는 이상 징후 → 사람에게 알림

# ============================================================
# AI Brain v3 — 산업 구조 해석 전략가 (KISBOT AI Brain v3)
# ============================================================
# "AI = 전략가(Strategy), Bot = 병사(Execution)" — 85:15 비율
# 5단계 깔때기: 거시→섹터→스크리닝→정밀→포트폴리오
ai_brain_v3:
  enabled: true
  strategic_model: "claude-opus-4-20250514"       # Opus: 전략 판단 (2A, 2E)
  tactical_model: "claude-sonnet-4-5-20250929"    # Sonnet: 전술 실행 (2B, 2D, 4B)
  daily_opus_limit: 3          # Opus 일일 호출 한도
  daily_sonnet_limit: 30       # Sonnet 일일 호출 한도
  fallback_to_sonnet: true     # Opus 장애 시 Sonnet 대행

  # 출력 파일 경로
  regime_output: "data/ai_strategic_analysis.json"
  sector_output: "data/ai_sector_focus.json"
  picks_output: "data/ai_v3_picks.json"

  # Agent 2A: 전략 두뇌 파라미터
  strategic_brain:
    max_industry_theses: 5     # 최대 산업 thesis 수
    min_conviction: 3          # 최소 conviction (1~10, 이 이상만 추천)
    max_new_buys: 3            # 일일 최대 신규 매수 종목 수
    relay_min_winrate: 70      # 릴레이 패턴 최소 승률 (%)

  # Agent 2D: 정밀 분석 파라미터 (Phase 2에서 구현)
  deep_analyst:
    min_conviction: 4          # 정밀 분석 통과 최소 conviction (1~10) — v12.0: 5→4 완화 (Perplexity 검증이 안전망)
    max_batch_size: 30         # 배치 최대 분석 종목 수

  # Agent 4B/4C: AI 매도 파라미터 (Phase 3에서 구현)
  sell_brain:
    check_times: ["10:00", "12:00", "14:00"]  # 장중 AI 매도 체크 시각
    preclose_time: "14:30"     # 프리클로즈 AI 매도 시각
    cache_ttl_min: 35          # ai_sell_cache TTL (분)

# ============================================================
# BRAIN → v3 Brain 연동 — 매크로 배분이 종목추천을 제약
# ============================================================
# BRAIN(brain.py)의 레짐 판정 + 배분 결과로
# v3 Brain(run_v3_brain.py)의 슬롯 수/conviction/예산을 캡.
# "천장만 걸고 바닥은 안 건다" — v3가 더 보수적인 건 OK
brain_v3_integration:
  enabled: true
  stale_hours: 24                    # brain_decision.json 유효 시간
  stale_default_regime: "CAUTION"    # 만료 시 기본 레짐

  # 레짐별 max_new_buys 상한 (v3 Phase 1 결과를 클램핑)
  regime_slot_cap:
    BULL: 99                         # 제한 없음 (v3 자체 설정 따름)
    PRE_BULL: 8                      # 강세 전환 조짐
    CAUTION: 5
    PRE_BEAR: 1
    BEAR: 2
    PRE_CRISIS: 0                    # 위기 전환 조짐 → 신규진입 금지
    CRISIS: 0                        # 신규진입 금지

  # BRAIN confidence → min_conviction 상향
  confidence_conviction_map:
    - {below: 0.30, min_conviction: 8}
    - {below: 0.50, min_conviction: 6}
    - {below: 0.70, min_conviction: 5}
    - {below: 1.01, min_conviction: 4}   # 기본값

# ============================================================
# 듀얼 AI 매도 시스템 — Claude + GPT 역할 분담
# ============================================================
# Claude Sonnet: 기술적 분석 + 포트폴리오 맥락 + 최종 판단
# GPT-4o: 뉴스 촉매 분석 + 내일/모레 전망
# 합의 규칙: GPT 촉매가 살아있으면 Claude의 매도 판단 무효화
dual_sell_system:
  enabled: true

  # GPT News Catalyst Analyst
  gpt_catalyst:
    model: "gpt-4o"
    max_tokens: 4000
    temperature: 0.3
    max_news_items: 40            # 뉴스 맥락 최대 줄수
    timeout_sec: 30               # GPT 응답 타임아웃
    fallback_on_failure: true     # GPT 실패 시 Claude 단독 판단

  # 합의 규칙
  consensus:
    catalyst_alive_overrides_sell: true    # GPT ALIVE → Claude SELL 무효화
    catalyst_fading_downgrades: true       # FADING → SELL을 PARTIAL로 다운
    manual_entry_protection: true          # 수동매수 자동매도 차단
    manual_entries_file: "manual_entries.json"

    # ChatGPT 보완: 불확실할 때 REDUCE 원칙
    uncertain_bias: "reduce"              # "reduce" = 불확실하면 PARTIAL_SELL, "hold" = 기존 HOLD 유지
    dead_catalyst_hold_to_reduce: true    # DEAD+HOLD → PARTIAL_SELL (촉매 소멸 시 축소)
    fading_weak_hold_to_reduce: true      # FADING(strength<0.4)+HOLD → PARTIAL_SELL

# ============================================================
# 텔레그램 매수/매도 AI 판단 — TradeAdvisor
# ============================================================
# 텔레그램에서 매수/매도 시 AI 분석 후 판단 제시
# false → 기존 즉시 확인 플로우 (AI 없이)
trade_advisor:
  enabled: true
  model: "claude-sonnet-4-5-20250929"   # 빠른 판단용 Sonnet
  max_analysis_sec: 15                   # 타임아웃
  perplexity_enabled: true               # 실시간 촉매 체크
  sell_cache_ttl_min: 35                 # ai_sell_cache 유효기간 (분)

  buy_thresholds:
    skip_rsi_above: 75                   # RSI 과열 기준
    skip_grade_below: "C"                # 등급 하한
    wait_near_high_pct: 3               # 52주 고점 근접 %

  sell_thresholds:
    catalyst_alive_block_sell: true       # 촉매 ALIVE면 매도 차단 추천
    partial_sell_pct: 50                 # 분할 매도 비율

# ============================================================
# 섹터 릴레이 엔진 — US→KR 4단계 릴레이 경보
# ============================================================
# config/relay_sectors.yaml에 상세 섹터 정의
# 여기는 on/off 및 전체 파라미터만
relay_engine:
  enabled: true
  config_file: "config/relay_sectors.yaml"     # 섹터 상세 설정
  alert_min_count: 3                           # 경보 3개 이상 동시 충족 시 거래
  telegram_enabled: true                       # 텔레그램 경보 발송

# ============================================================
# AI 역할 업그레이드 — Vision + o1 + Perplexity 검증
# ============================================================
# v12.0: 3가지 AI 업그레이드
#   Phase 0 (NEW): GPT o1 Deep Thinking → 거시/미시 분석
#   Phase 4 (MOD): Claude Vision → 차트 이미지 분석
#   Phase 6 (NEW): Perplexity 교차검증 → 팩트체크
ai_upgrade:
  # --- Claude Vision (Phase 4) ---
  vision_enabled: true                     # DeepAnalyst에 차트 이미지 첨부
  chart_days: 60                           # 렌더링할 최근 거래일 수

  # --- GPT o1 Deep Thinking (Phase 0) ---
  o1_enabled: true                         # Phase 0 활성화
  o1_model: "o1"                           # o1 모델 ID
  o1_timeout_sec: 120                      # o1 타임아웃 (초)

  # --- Perplexity 교차검증 (Phase 6) ---
  perplexity_verify_enabled: true          # Phase 6 활성화
  perplexity_model: "sonar"                # Perplexity 모델
  perplexity_max_verifications: 5          # 최대 종목 검증 수
  perplexity_max_thesis_checks: 3          # 최대 thesis 검증 수

# ============================================================
# US OVERNIGHT — 한국 수급 레이어 + 인버스 시그널
# ============================================================
us_overnight:
  # L1.5 한국 장마감 수급 레이어
  kr_closing_layer:
    enabled: true                     # true → L1.5 활성화
    weight_without_nw: 0.80           # NW 비활성 시: L1(80%) + KR(20%)
    weight_kr_only: 0.20

  # 인버스 ETF 대응 시그널
  inverse_signal:
    enabled: false                    # Phase 2에서 활성화 예정

# ============================================================
# NIGHTWATCH — 글로벌 시장 야간 수호자 (v1.0)
# ============================================================
# 기존 US Overnight과 앙상블:
#   기존 L1 Score * 0.70 + NIGHTWATCH Score * 0.30
# 채권 자경단 비토: 주식↓ + 금리↑ → 강제 STRONG_BEAR
# ============================================================
nightwatch:
  enabled: true

  # 앙상블 가중치 (기존 vs NIGHTWATCH vs KR)
  ensemble_weights:
    existing: 0.70             # 2-way (KR 비활성 시): L1(70%) + NW(30%)
    nightwatch: 0.30
    # 3-way 최적 (780일 백테스트: Pearson +0.012, 방향적중 51%)
    existing_with_kr: 0.40     # L1_US 40%
    kr_closing: 0.30           # KR 수급 30%
    # nightwatch: 0.30 (위와 공유)

  # NIGHTWATCH 내부 레이어 가중치 (4개 레이어, 합=1.0)
  layer_weights:
    leading: 0.20              # L0: HYG 크레딧 + VIX 기간구조
    regime_transition: 0.20    # L2: 크레딧 스프레드 + MOVE + 수익률 커브 (2D)
    bond_vigilante: 0.35       # L1: 채권 자경단 (핵심)
    fx_triangle: 0.25          # L4: 환율 삼각형

  # L2: 레짐 전환 선행지표 (2D)
  regime_transition:
    credit_spread_z_warn: 3.0       # HY-IG z-score 경고 (v13.8: 1.5→3.0, 백테스트 적중률 35%로 상향)
    credit_spread_z_critical: 4.0   # HY-IG z-score 위기 (v13.8: 2.0→4.0)
    move_z_warn: 3.0                # MOVE z-score 경고 (v13.8: 1.5→3.0, 백테스트 적중률 50%로 상향)
    move_z_critical: 4.0            # MOVE z-score 위기 (v13.8: 2.0→4.0)
    curve_inversion_threshold: 0    # 10Y-3M < 0 = 역전

  # L1: 채권 자경단 비토
  # v13.8: 백테스트 적중률 37%(랜덤 이하) → 비활성화. 코드 유지, enabled=false
  bond_vigilante:
    enabled: false             # v13.8: 비활성화 (적중률 37%, 오탐 과다)
    spy_threshold: -0.01      # SPY -1% 이하 + 금리 상승 → 비토
    tnx_threshold_bp: 0.05    # 10Y 금리 +5bp 이상 (parquet %p 단위: 0.05 = 5bp)
    veto_score_cap: -0.50     # 비토 시 ensemble score 상한
    position_cap: 0.30        # 비토 시 포지션 30% 축소
    emergency_alert: true     # 비토 시 별도 긴급 텔레그램 발송

  # L4: 환율 삼각형
  fx_triangle:
    yen_carry_threshold: -1.5  # USD/JPY -1.5% = 엔캐리 청산 경고
    krw_threshold: 1.0         # KRW/USD +1.0% = 원화 약세 경고

  # L0: HYG 선행지표
  hyg:
    warn_ret_5d: -0.02        # 5일 수익률 -2% → 경고
    critical_ret_5d: -0.04    # 5일 수익률 -4% → 위험

  # 블라인드 테스트
  blind_test:
    enabled: true
    log_dir: "data/us_market/nightwatch_blind"

  # ─── MACRO GATE (v12.3) ───
  # US Overnight grade + cross_regime + shock_type → 매수 게이트
  # scan_buy_candidates.py run_pipeline() 최우선 실행
  macro_gate:
    enabled: true
    # 3색 신호등 (채권 자경단 기반)
    # RED:    주식↓ + 금리↑ (DIVERGENCE) → 절대 금지
    # YELLOW: 주식↓ + 금리↓ (CORRECTION) → 최대 1종목, 반토막 포지션
    # GREEN:  주식↑ + 금리 안정 (NORMAL)  → 정상 운영
    red_action: "block"           # block = 매수 0건 (기본)
    yellow_max_survivors: 1       # 최대 통과 종목 수
    yellow_position_mult: 0.5     # 포지션 반토막
    # grade 기반 추가 필터
    strong_bear_action: "block"   # STRONG_BEAR → 매수 0건 (기본)
    mild_bear_max_survivors: 2    # MILD_BEAR → 최대 2종목
    # shock_type 기반
    compound_action: "restrict"   # COMPOUND → MILD_BEAR와 동일 취급
    compound_max_survivors: 1
    # 거래량 필터 (v12.3 수급 프록시)
    # vol_5d / vol_20d >= threshold → 거래량 증가 종목만 통과
    vol_filter_threshold: 0.85   # 백테스트 최적값 (승률 50→58%, PF 1.70→2.37)
    # ─── 역발상 우회 (swing_philosophy.enabled 시 RED에서도 우량주 선별 매수) ───
    # "워런 버핏은 전쟁 전후에 샀다" — RED ≠ 전면금지, RED = 까다롭게 고른다
    contrarian_override:
      enabled: true               # BRAIN contrarian_opportunity도 true여야 작동
      cap: 2                      # RED에서 최대 2종목 통과
      position_mult: 0.3          # 포지션 30% (분할진입 1단계)
      conditions:
        min_grade: "A"              # A등급 필수
        min_quality_score: 0.6      # Q_Score >= 0.6
        min_value_score: 0.6        # V_Score >= 0.6
        min_market_cap_억: 5000     # 시총 5,000억 이상
        min_positive_factors: 3     # 4팩터(SD/M/V/Q) 중 3개+ 양수
        trap_filter: true           # LENS 3 밸류트랩 종목 제외

# ─── 3단 예측 체인 (유럽장 오픈 기반) ───
predict_chain:
  enabled: true

  # Stage 1: 아시안 리스크 (09:00~15:30)
  asian_risk:
    audjpy_threshold_pct: 0.3    # AUD/JPY ±0.3% = 방향 판정
    cnh_threshold_pct: 0.2       # USD/CNH ±0.2%
    weight_audjpy: 0.50
    weight_cnh: 0.30
    weight_futures: 0.20

  # Stage 2: 유럽 오픈 (16:00~16:30) ★핵심
  europe_open:
    dax_30m_threshold_pct: 0.3   # DAX 30분 ±0.3%
    eurusd_threshold_pct: 0.15   # EUR/USD ±0.15%
    weight_dax: 0.55             # DAX가 가장 높은 가중치
    weight_eurusd: 0.25
    weight_futures: 0.20

  # Stage 3: 괴리 감지
  divergence:
    hyg_futures_gap_pct: 0.5
    bond_gold_diverge: true
    vix_curve_shift: true

  # 최종 판정
  signal:
    min_agreement_score: 0.4     # 최소 동의 점수
    direction_match_required: true  # 1단/2단 같은 방향 필수

  # 블라인드 테스트
  blind_test:
    enabled: true

# ─── 소형주 급등 포착 (v12.4) ───
smallcap_explosion:
  enabled: true
  min_trading_value: 5e8     # 20일 평균 거래대금 5억+
  min_price: 1000            # 최소 종가
  exclude_main_universe: true  # 메인 유니버스(대형주) 제외

  # Pattern A: 거래량 폭발 + 돌파
  vol_breakout:
    min_vol_ratio: 2.5       # MA20 대비 최소 배수

  # Pattern B: 세력 털기 V자
  shakeout:
    min_drop_pct: -5         # 급락 최소
    min_bounce_pct: 3        # 반등 최소
    min_vol_ratio: 1.0       # 반등일 최소 거래량

  # Pattern C: 연속 양봉
  consecutive:
    min_streak: 3            # 최소 연속일
    min_cum_return: 8        # 최소 누적 상승%

  telegram_top_n: 10         # 알림 최대 종목수

# ─── ETF 수급 왜곡 보정 (v12.5) ───
etf_flow_distortion:
  enabled: true

  # A: 수급 보정 — 기관 순매수에서 ETF 기계적 매수 차감
  distortion_correction:
    enabled: true
    high_distortion_threshold: 50    # 50%+ → 기관점수 0.5배
    medium_distortion_threshold: 30  # 30~50% → 기관점수 0.7배
    exclude_tickers:                 # 왜곡 효과 없는 종목 (X-Ray v2 검증)
      - "005930"  # 삼성전자 (유동성 과다)
      - "005380"  # 현대차 (교차 흐름)

  # B: 선행 시그널 — ETF 개인 급증 → T+1~T+2 기관 매수 예측
  leading_signal:
    enabled: true
    surge_threshold: 2.0             # MA20 대비 N배 이상
    strong_threshold: 3.0            # STRONG 등급 기준
    telegram_alert: true
    auto_buy: false                  # 절대 자동매수 안 함

  # C: 센티먼트 — ETF 개인 순매수 추세로 섹터 관심도 판단
  sentiment:
    enabled: true
    hot_threshold: 100e8             # 5일 100억+ 순매수
    cold_threshold: -100e8           # 5일 100억+ 순매도
    score_adjustment: 10             # HOT +10 / COLD -10

# ─── BRAIN — 자본배분 중앙 두뇌 (v13.0) ───
brain:
  enabled: true

  # 개별종목 스윙 기본 비중 (BRAIN이 ETF 3축과 별도로 관리)
  swing_base_pct: 30

  # 안전장치
  max_daily_change_pct: 20    # 일일 최대 변경폭 (%p)
  confirmation_days: 2         # 레짐 변경 시 확인 대기 일수

  # NightWatch 보정 파라미터
  nw_adjustment:
    bond_veto_sector_cut_ratio: 0.5    # 채권 비토 시 섹터 축소 비율
    strong_negative_scale: 0.80         # 강한 부정 시 투자 축소 배수
    negative_leverage_cut_ratio: 0.3    # 부정 시 레버리지 축소 비율
    positive_min_cash: 15               # 긍정 확대 시 최소 현금(%)
    positive_max_boost: 5.0             # 긍정 확대 시 최대 이동(%p)
    positive_sector_ratio: 0.6          # 긍정 확대 시 섹터 배분 비율
    positive_swing_ratio: 0.4           # 긍정 확대 시 스윙 배분 비율

  # 텔레그램 브리핑
  telegram_briefing: true

# ─── COT Tracker (Slow Eye) ───
# CFTC Commitments of Traders 주간 기관 포지셔닝 분석
# NIGHTWATCH(일간 Fast Eye)와 교차검증하여 확신도 조정
cot_tracker:
  enabled: true
  zscore_window: 52                    # slow z-score 롤링 윈도우 (주, 계절성 제거)
  fast_zscore_window: 13               # fast z-score 롤링 윈도우 (주, 급변 감지)
  stale_warn_days: 10                  # 데이터 경고 임계 (일)
  stale_ignore_days: 14                # 데이터 무시 임계 (일)
  thresholds:
    sp500:
      bearish_z: -1.0
      strong_bearish_z: -1.5
      bullish_z: 1.0
    gold:
      safety_surge_z: 1.5
      extreme_surge_z: 2.0
      complacent_z: -1.0
    treasury10y:
      slowdown_bet_z: 1.0
      strong_slowdown_z: 1.5
      reflation_z: -1.0
    crude_oil:
      cyclical_down_z: -1.0
      demand_collapse_z: -1.5
      demand_boom_z: 1.5
  arm_adjustments:
    risk_off_cut_pct: 5.0              # S&P 매도 시 리스크ARM 축소 (%p)
    safety_demand_boost_pct: 3.0       # 금 안전수요 시 금ETF 확대 (%p)
    slowdown_bond_boost_pct: 3.0       # 국채 매수 시 채권ETF 확대 (%p)
  cross_validation:
    enabled: false                      # v13.8: change_mult 비활성화 (1.0 고정). 로그는 유지
    aligned_threshold: 0.50             # v13.8: ±0.20→±0.50 (92% MIXED 해소)
    aligned_confidence_bonus: 0.10      # NW-COT 동조 시 확신도 가산 (enabled=false 시 미적용)
    diverged_confidence_penalty: 0.05   # NW-COT 괴리 시 확신도 차감 (enabled=false 시 미적용)
    diverged_change_mult: 0.50          # 괴리 시 배분 변경폭 배수 (enabled=false 시 1.0 고정)

# ─── 유동성 사이클 예측 레이어 (5D) ───
# FRED 5대 지표 기반 중기 유동성 레짐 판정
# BRAIN Step 5.6: TIGHTENING/STRESS에서 방어만 (공격 안 함)
liquidity_cycle:
  enabled: true
  zscore_window: 60              # 3개월 롤링 (중기)
  stale_warn_days: 5
  stale_ignore_days: 14
  indicators:
    net_liquidity_weight: 0.50   # 순유동성 (WALCL-TGA-RRP)
    m2_momentum_weight: 0.30     # M2 YoY
    reserves_weight: 0.20        # 은행 지준
  thresholds:
    tightening_z: -1.0           # Net Liquidity z < -1.0 → 긴축
    stress_z: -1.5               # Net Liquidity z < -1.5 + 지준 z < -1.0 → 위기
    ample_z: 1.0                 # Net Liquidity z > +1.0 + M2 YoY > 0 → 풍부
    reserve_stress_z: -1.0       # 은행 지준 z < -1.0 → 스트레스
  arm_adjustments:
    stress_sector_cut: 10.0      # STRESS → 섹터 -10%p
    stress_gold_boost: 5.0       # STRESS → 금 +5%p
    tightening_leverage_cut: 5.0 # TIGHTENING → 레버리지 -5%p
    tightening_sector_cut: 5.0   # TIGHTENING → 섹터 -5%p
  fred_indicators:
    - {code: RRPONTSYD, label: "Reverse Repo", freq: daily}
    - {code: WTREGEN, label: "TGA", freq: weekly}
    - {code: WM2NS, label: "M2", freq: weekly}
    - {code: WALCL, label: "Fed Balance Sheet", freq: weekly}
    - {code: TOTRESNS, label: "Total Reserves", freq: biweekly}

# ─── SHIELD 포트폴리오 방어 시스템 ───
# BRAIN 전에 실행. 3대 방어축:
#   S1: 섹터 오버랩 감지 (스윙+ETF 중복)
#   S2: MDD 실시간 추적 + 킬스위치
#   S3: 종목별 손절 통합 + 시스템적 리스크
shield:
  enabled: true
  max_sector_exposure_pct: 30       # 단일 섹터 최대 노출 (%)
  deep_loss_pct: -15.0              # 개별종목 손절 경고 기준 (%)
  simultaneous_decline_pct: -5.0    # 동시 하락 판정 기준 (%)
  systemic_min_count: 3             # N개+ 동시 하락 → 시스템적 리스크
  equity_tracker_auto_update: true  # equity_tracker.json 자동 업데이트
  telegram_alert: true
  alert_levels: ["ORANGE", "RED"]   # 이 등급 이상 텔레그램 발송

  # S4: 교차자산 상관관계 붕괴 감지 (3D)
  correlation:
    enabled: true
    window: 60                       # 롤링 상관계수 윈도우 (일)
    pairs:
      gold_spy:
        normal_sign: "negative"      # 정상: 음의 상관 (안전자산 ↔ 위험자산)
        breakdown_threshold: 0.3     # 이 이상이면 동시하락 = 유동성 위기
      dollar_spy:
        normal_sign: "negative"      # 정상: 약한 음의 상관
        breakdown_threshold: 0.4     # 달러-주식 동조 = 비정상
      bond_spy:
        normal_sign: "negative"      # 정상: 음의 상관 (flight to safety)
        breakdown_threshold: 0.3     # 채권-주식 동조 = 헤지 실패
      oil_spy:
        normal_sign: "positive"      # 정상: 양의 상관 (경기 동행)
        breakdown_threshold: -0.3    # 유가↓+주식↓ = 수요 붕괴
    danger_count: 3                  # 3개+ 동시 붕괴 = DANGER

# ============================================================
# 컨센서스 스크리너 — wisereport 애널리스트 컨센서스 기반 중기 투자 후보
# ============================================================
consensus_scanner:
  enabled: true
  min_turnover_억: 100            # 최소 거래대금 (대형주 필터)
  min_price: 5000                 # 최소 주가
  fetch_delay_sec: 0.5            # wisereport 요청 간격
  max_retries: 3                  # HTTP 재시도

  scoring:
    upside_weight: 35             # 상승여력 배점
    per_weight: 20                # Forward PER 배점
    analyst_weight: 15            # 애널리스트 확신 배점
    technical_weight: 20          # 기술적 건전성 배점
    dividend_weight: 10           # 배당 보너스 배점

  thresholds:
    min_upside_pct: 10            # 최소 상승여력
    min_analyst_count: 3          # 최소 기관수
    min_opinion_score: 3.0        # 최소 투자의견

  report:
    top_n: 15                     # 리포트 종목수
    send_telegram: true           # 텔레그램 발송
    save_html: true               # HTML 저장

# ============================================================
# 컨센서스 풀 → 내일 추천 통합 (전략 J)
# scan_consensus.py 결과를 scan_tomorrow_picks.py에 연동
# ============================================================
# ============================================================
# KRX 국적별 외국인 수급 스캐너
# KRX Data Marketplace HARD API → 국적별 거래량 일별 수집 + 추이 분석
# ============================================================
nationality_scanner:
  enabled: true
  fetch_delay_sec: 0.3            # KRX API 요청 간격
  min_data_days: 3                # 분석 최소 데이터 일수

  # 국적 그룹 분류 (시그널 판정용)
  country_groups:
    institutional: ["영국", "룩셈부르크", "아일랜드", "노르웨이", "스위스", "네덜란드", "프랑스", "독일", "스웨덴"]
    asia: ["중국", "홍콩", "싱가포르", "대만", "일본"]
    hedge: ["케이맨제도", "케이맨", "버뮤다", "영국령 버진아일랜", "영국령버진아일", "BVI"]
    middle_east: ["사우디아라비아", "카타르", "쿠웨이트", "아랍에미리트"]

  # 스코어링 배점 (총 -50 ~ +50)
  scoring:
    inst_trend_max: 15            # 기관 추세 최대 ±15
    asia_trend_max: 15            # 아시아 추세 최대 ±15
    consecutive_max: 10           # 연속 매집/이탈 ±10
    hedge_max: 5                  # 헤지펀드 ±5
    kis_direction_max: 10         # KIS 외국인 순매수 방향 ±10

  # 시그널 등급 커트라인
  thresholds:
    strong_buy: 30                # ≥30: 강력매수
    buy: 15                       # ≥15: 매수
    neutral: -10                  # >-10: 중립
    caution: -25                  # >-25: 주의
    # ≤-25: 매도

consensus_pool:
  enabled: true                   # 컨센서스 풀 연동 활성화
  pool_only: false                # true: 풀 내 종목만 추천 / false: 풀 외 종목도 추천 (보너스만)
  # pool_only=false → 기존 11개 소스 전체 유지 + 풀 내 종목에 보너스
  # pool_only=true  → 컨센서스 풀 안에 있는 종목만 추천 대상 (A 철학 모드)

# ============================================================
# 네 마녀의 날 (쿼드러플 위칭데이) — 선물·옵션 동시 만기
# ============================================================
# 3/6/9/12월 두 번째 목요일.
# KOSPI200 선물+옵션 + 개별주식 선물+옵션 동시 만기.
# 프로그램 매매 폭발 → 변동성 급등 → 신규 매수 주의.
options_expiry:
  enabled: true
  # 감점 (매수 스코어에서 차감)
  penalty_critical: -10           # 당일 (D-0)
  penalty_high: -5                # 전일 (D-1)
  penalty_moderate: -3            # 같은 주 (D-2~4)
  # 알림
  telegram_alert_d1: true         # D-1 장마감 후 텔레그램 경고
  morning_briefing_warn: true     # 당일 아침 브리핑에 경고 포함

# ── 안전마진 플래그 (정상화 EPS 기반) ──
# ─── 일일 시장 학습 ───
market_learner:
  enabled: true
  ai_synthesis: true
  ai_model: "claude-sonnet-4-5"
  rolling_window_days: 20
  min_return_pct: 3.0              # 놓친 기회 기준 (+3% 이상)
  send_telegram: true
  signals_to_track:
    - tomorrow_picks
    - pullback_scan
    - whale_detect
    - accumulation_tracker
    - dart_event
    - volume_spike
    - dual_buying
    - safety_margin
    - ai_v3_picks
    - overnight_signal

# ─── NXT (넥스트레이드) 대체거래소 ───
nxt:
  enabled: true
  master_path: "data/nxt/nxt_master.json"
  collect_premarket: true         # 프리마켓 수집 (08:00~08:55)
  collect_aftermarket: true       # 애프터마켓 수집 (15:35~19:55)
  pre_interval_sec: 300           # 프리 수집 간격 (5분)
  after_interval_sec: 600         # 애프터 수집 간격 (10분)
  premarket_alert: true           # 프리마켓 이상 시 텔레그램
  aftermarket_signal: true        # 애프터 수급 시그널 생성

  # 수급 시그널 임계값
  net_buy_strong_ratio: 0.60      # 순매수비율 60% 이상 → 강한 매집
  premium_threshold_pct: 0.3      # 프리미엄 0.3% 이상 → BUY 시그널
  min_volume: 500                 # 최소 거래량 (주)

  # 프리마켓 매도 전략 (데이터 축적 후 활성화)
  pre_sell:
    enabled: false                # 아직 비활성 (최소 2주 데이터 축적 후)
    gap_up_threshold: 1.5         # 갭업 1.5% 이상 시 매도 고려
    min_volume: 1000              # 최소 거래량

safety_margin:
  enabled: true
  per_discount_ratio: 0.80    # Forward PER 20% 할인 (완화: 0.70→0.80)
  per_floor: 4.0              # 보수적 PER 하한
  per_cap: 15.0               # 보수적 PER 상한 (완화: 12→15)
  per_default: 8.0            # PER 없을 때 기본값 (완화: 7→8)
  target_discount_ratio: 0.75 # 목표가 25% 할인 (완화: 0.70→0.75)
  min_analyst_count: 3        # 지속성 판정 최소 애널리스트 수
  min_opinion_score: 3.5      # 지속성 판정 최소 투자의견
  yellow_threshold_pct: -30   # 바닥가 대비 이 % 이내면 YELLOW (완화: -20→-30)
  save_history: true          # 일별 컨센서스 히스토리 저장

# ============================================================
# FLOWX 구독 전환 시스템 (Phase C)
# ============================================================
flowx:
  enabled: true

  # 모닝 브리핑 (STEP 1)
  morning_briefing:
    enabled: true
    schedule_time: "08:00"          # BAT-M 실행 시간
    telegram_personal: true         # 개인채널 전체 발송
    telegram_flowx: false           # FLOWX채널 요약 발송 (채널ID 설정 후)
    flowx_channel_id: ""            # FLOWX 텔레그램 채널 ID

  # 시그널 로깅 (STEP 2)
  signal_logging:
    enabled: true
    min_grade: "A"                  # Supabase에 기록할 최소 등급
    min_score: 65                   # 최소 점수
    performance_update_time: "16:10"  # 수익률 업데이트 시간
    scoreboard_update_time: "16:30"   # 성적표 집계 시간

  # 단타봇 (STEP 3)
  daytrading:
    enabled: true
    close_time: "15:20"             # 일괄 청산 시간
    min_grade: "A"                  # 최소 등급
    min_score: 65                   # 최소 점수

  # FLOWX 공개추천 모드 (주린이 대상)
  recommendation:
    enabled: true
    min_sources: 1                  # 1소스만으로도 추천
    min_top_count: 5                # TOP 최소 5개 보장
    regime_boost_floor: 0.8         # BEAR에서도 0.8x 이상
    accumulation_boost: 1.3         # 매집추적 소스 강화 (적중률 1위)

  # FREE/PAID 경계 (STEP 4)
  tiers:
    free_picks_limit: 2             # FREE 유저 추천 종목 수
    free_scoreboard: "hit_rate_only"  # FREE 유저 성적표 범위

# ============================================================
# Master Brain — 전체 시스템 통합 두뇌 (30+ 소스 → 추론 체인)
# ============================================================
master_brain:
  enabled: true
  model: "claude-opus-4-20250514"
  max_tokens: 16000
  max_reasoning_chains: 8
  output_path: "data/master_brain_judgment.json"
  telegram_notify: true

# ============================================================
# CPI / 인플레이션 트래커 (FRED API)
# ============================================================
cpi_tracker:
  enabled: true
  fred_api_key_env: "FRED_API_KEY"
  output_path: "data/macro/cpi_data.json"
  series:
    cpi: "CPIAUCSL"
    core_pce: "PCEPILFE"
    unemployment: "UNRATE"
    fed_funds: "FEDFUNDS"
  stagflation:
    cpi_warning: 4.0        # CPI > 4% → WARNING
    cpi_alert: 5.0           # CPI > 5% → ALERT
    unemployment_rising: 0.3 # 3개월 상승폭 > 0.3%p → 상승 추세

# ============================================================
# Alpha Engine — L1 REGIME + L4 RISK (Phase I)
# ============================================================
alpha_engine:
  enabled: false                      # true로 켜면 Alpha Engine 활성화
  regime:
    hysteresis_upgrade_days: 3        # 업그레이드 확인 일수 (다운그레이드는 즉시)
    params:
      BULL:
        max_positions: 5
        position_pct: 0.20            # 종목당 최대 비중
        stop_mult: 2.0                # ATR 손절 배수
        cash_min_pct: 0.25            # 최소 현금 비중
      CAUTION:
        max_positions: 3
        position_pct: 0.15
        stop_mult: 1.5
        cash_min_pct: 0.30
      BEAR:
        max_positions: 2
        position_pct: 0.10
        stop_mult: 1.5
        cash_min_pct: 0.40
      CRISIS:
        max_positions: 0
        position_pct: 0.00
        stop_mult: 1.0
        cash_min_pct: 0.65
  risk:
    daily_loss_limit: -0.03           # 일일 -3%
    weekly_loss_limit: -0.05          # 주간 -5%
    mdd_circuit_breaker: -0.15        # MDD -15% 서킷브레이커
    x1_stop_mult: 2.0                # X1 Hard Stop ATR 배수
    x2_consecutive_days: 3            # X2 수급 이탈 연속일
    x3_trailing_mult: 2.5            # X3 트레일링 ATR 배수
    x4_max_hold_days: 10             # X4 시간 청산 기준일
    x4_min_pnl_pct: 0.02             # X4 시간 청산 최소 수익
    x5_target_mult: 4.0              # X5 목표 ATR 배수
    x5_partial_pct: 0.50             # X5 부분청산 비율

# ─── ALPHA SCORING V3: 백테스트 입증 팩터 기반 (2026-04-02) ───
alpha_v3:
  enabled: true                        # v3 보조태그 표시 (점수/등급 영향 없음, 시그널 참고용)
  # 기존 5축 스코어링이 메인, v3는 PULLBACK/VOL 등 팩터 시그널 표시만

# ─── ALPHA ENGINE V2: 멀티팩터 (비활성 — 검증 완료 후 활성화) ───
alpha_v2:
  enabled: true                       # V2 활성화 (2026-03-25, 백테스트 PF 1.375 확인)
  use_unified_scorer: false           # true면 4팩터 통합 스코어러 (Phase 2)
  # Phase 1: 기존 5축 레짐별 재가중치 (STEP 1 Sharpe 비율 기반)
  # S5(수급) 0.96 >> S4(모멘텀) 0.53 > S3(OU) 0.47 > S1(에너지) 0.29 > S2(밸류) 0.16
  scorer_weights:
    bull:     { S1: 0.12, S2: 0.08, S3: 0.15, S4: 0.25, S5: 0.40 }
    caution:  { S1: 0.12, S2: 0.07, S3: 0.19, S4: 0.22, S5: 0.40 }
    bear:     { S1: 0.25, S2: 0.10, S3: 0.30, S4: 0.10, S5: 0.25 }
    crisis:   { S1: 0.00, S2: 0.00, S3: 0.00, S4: 0.00, S5: 0.00 }
  # Phase 2: 최종 4팩터 (Q/V 팩터 구축 후 전환 — STEP 3~4 완료 필요)
  factor_weights:
    bull:    { sd: 0.30, momentum: 0.35, value: 0.15, quality: 0.20 }
    caution: { sd: 0.25, momentum: 0.20, value: 0.25, quality: 0.30 }
    bear:    { sd: 0.15, momentum: 0.10, value: 0.40, quality: 0.35 }
    crisis:  { sd: 0.00, momentum: 0.00, value: 0.00, quality: 0.00 }
  sizing:
    risk_pct: 0.01                    # 거래당 1% 리스크
    stop_atr_mult: 2.0                # ATR x 2 손절
    use_kelly: false                  # Kelly 사이징 (검증 후 활성화)
    use_correlation: false            # 상관관계 감산 (검증 후 활성화)
    corr_threshold: 0.70              # 이 이상이면 고상관 판정
    corr_penalty: 0.70                # 고상관 시 사이즈 × 0.7 (30% 감축)
    sector_max_pct: 0.30              # 동일 섹터 합산 비중 상한 30%
    kelly_default: 0.50               # 데이터 부족 시 기본 Kelly 배수
  # STEP 7: LENS LAYER
  lens_enabled: true                    # LENS 활성화 (2026-03-25, 비파괴 PASS 확인)
  lens:
    flow_map:
      hot_boost: 1.2                    # hot 섹터 가중치 배수
      cold_penalty: 0.8                 # cold 섹터 가중치 배수
      top_n: 3                          # 상위/하위 N개 섹터
    structural_value:
      trap_filter_enabled: true         # 밸류트랩 필터 ON/OFF
    asymmetry: {}                       # 레짐별 오버라이드 (비어있으면 기본값)
  backtest:
    min_trades: 200
    min_pf: 1.3
    min_sharpe: 1.0
    max_mdd: -0.15

# ─── INTRADAY EYE: 장중 실시간 감시 (STEP 8) ───
intraday_eye:
  enabled: true
  interval_seconds: 300           # 5분 간격
  start_time: "09:05"             # 개장 5분 후부터
  end_time: "15:20"               # 장마감 10분 후까지
  cooldown_minutes: 30            # 같은 종목+감지기 30분 쿨다운

  # EYE-01: 수급 반전
  eye01_min_sell_qty: 1000        # 외국인+기관 순매도 합산 최소 수량

  # EYE-02: 급락 감지
  eye02_drop_pct: -3.0            # 전일 대비 -3% 이하

  # EYE-03: 거래량 폭발
  eye03_vol_mult: 3.0             # 평균 거래량 × 3배 이상

  # EYE-04: 이평선 이탈 (간이 판정)
  eye04_ma_proxy_pct: -2.0        # 전일 대비 -2% → MA 이탈 가능성

  # EYE-05: 시장 급변
  eye05_kospi_pct: 1.5            # KOSPI ±1.5% 이상

  # EYE-06: 목표가 접근
  eye06_target_pct: 8.0           # 매입가 대비 +8%

  # EYE-07: 신규 기회
  eye07_opp_pct: 3.0              # 워치리스트 +3% 이상
  watchlist:                      # 관심종목 (user watchlist)
    - "267270"                    # 현대건설기계  (산일전기→대체, 시총 기준)
    - "272210"                    # 한화시스템
    - "103140"                    # 풍산
    - "071050"                    # 한국금융지주
    - "432320"                    # 달바글로벌
    - "090430"                    # 아모레퍼시픽
    - "051900"                    # LG생활건강

# ============================================================
# 정보봇(JGIS) ↔ 퀀트봇 데이터 파이프라인
# ============================================================
jgis_integration:
  enabled: true
  shared_path: "D:/shared-bot-data/jgis_to_quant"
  files:
    daily_intelligence: "daily_intelligence.json"    # 매일 08:00 정보봇이 생성
    breaking_alerts: "breaking_alerts.json"           # 긴급 뉴스 발생 시 생성
    sector_flow: "sector_flow_jgis.json"             # US→KR 릴레이 + 글로벌 자금흐름
  fallback_on_missing: true    # 파일 없으면 자체 로직으로 fallback
  sentiment_boost: 0.15        # 센티먼트 70+ 섹터 부스트
  sentiment_penalty: 0.15      # 센티먼트 30- 섹터 패널티
  relay_min_confidence: 70     # US→KR 릴레이 최소 신뢰도

# ============================================================
# Execution Alpha — 매매 실행 품질 개선 (EX-1 ~ EX-5)
# ============================================================
execution_alpha:
  enabled: false                    # true로 바꾸면 활성화

  # ── EX-1: VWAP 기반 동적 진입 ──
  dynamic_entry:
    enabled: true
    base_discount_pct: 0.5          # 기본 할인율 (%)
    vwap_adj_range_pct: 0.3         # ±0.3% VWAP 기반 조정 범위
    vwap_premium_limit_pct: 0.5     # VWAP+0.5% 이상이면 진입 보류

  # ── EX-2: 호가창 스프레드 분석 ──
  spread_analysis:
    enabled: true
    tight_bps: 10                   # <10bps = 유동성 풍부 → aggressive
    wide_bps: 30                    # >30bps = 유동성 부족 → patient
    depth_levels: 3                 # 분석할 호가 레벨 수

  # ── EX-3: 프로그램 매도 프록시 ──
  program_proxy:
    enabled: true
    volume_spike_mult: 3.0          # 20봉 평균 × 3배 + 음봉 → 프로그램 매도 추정
    kospi_drop_pct: -0.5            # KOSPI -0.5% 이상 + 동반 하락 → 연동
    absorption_bars: 2              # 양봉 2개 연속 + VWAP 복귀 → 소화 완료

  # ── EX-4: 스마트 매도 (X1~X5 유형별) ──
  smart_sell:
    enabled: true
    x1_method: "market_immediate"   # X1 하드스톱 → 즉시 시장가
    x5_premium_pct: 0.3             # X5 목표가 → 지정가 +0.3%
    x5_timeout_min: 5               # X5 미체결 시 5분 → 시장가
    x3_premium_pct: 0.2             # X3 트레일링 → 지정가 +0.2%
    x3_timeout_min: 2               # X3 미체결 시 2분 → 시장가
    x4_timeout_min: 15              # X4 시간제한 → VWAP 기준 15분 대기
    x2_premium_pct: 0.1             # X2 수급이탈 → 지정가 +0.1%
    x2_timeout_min: 5               # X2 미체결 시 5분 → 시장가

  # ── EX-5: 실행 품질 측정 ──
  quality_tracking:
    enabled: true
    alert_threshold_bps: 50         # 50bps 이상 슬리피지 시 경고

# ══════════════════════════════════════════════════════
# Swing Philosophy — 기관형 스윙 트레이더 전환
# enabled: false → 기존 동작 100% 동일
# ══════════════════════════════════════════════════════
swing_philosophy:
  enabled: true

  # SW-1: 레짐별 동적 손절 (ATR 배수)
  dynamic_stop:
    BULL: 2.5
    CAUTION: 3.0
    BEAR: 3.5
    CRISIS: 2.0

  # SW-2: 레짐별 동적 시간청산
  dynamic_time:
    BULL: { max_days: 15, min_pnl_pct: 0.02 }
    CAUTION: { max_days: 20, min_pnl_pct: 0.01 }
    BEAR: { max_days: 25, min_pnl_pct: 0.005 }
    CRISIS: { max_days: 10, min_pnl_pct: 0.03 }

  # SW-3: 역발상 매수 (하락장 진입)
  contrarian:
    BEAR: { slots: 3, grades: ["A"], require_quality: true, require_value: true }
    CRISIS: { slots: 1, grades: ["A"], require_quality: true, require_value: true }
    # SW-3 보강: 역발상 V2 팩터 가중치 오버라이드
    # 원래 4팩터: value 0.45, quality 0.35, sd 0.15, momentum 0.05
    # S1~S5 매핑: S1(바닥) 0.15, S2(가치) 0.35, S3(반등) 0.25, S4(모멘텀) 0.05, S5(수급) 0.20
    scorer_override:
      enabled: true
      weights: { S1: 0.15, S2: 0.35, S3: 0.25, S4: 0.05, S5: 0.20 }
    # 4팩터 가중치 (UnifiedV2Scorer 전환 시 사용)
    factor_override: { sd: 0.15, momentum: 0.05, value: 0.45, quality: 0.35 }

  # SW-4: 3단계 분할 진입
  staged_entry:
    enabled: true
    stages: [0.4, 0.4, 0.2]
    dip_thresholds: [-0.02, -0.03]

  # SW-5: 확신 기반 사이징
  conviction_sizing:
    enabled: true
    base_pct: 0.10
    s_grade_mult: 1.5
    a_grade_mult: 1.2
    b_grade_mult: 0.8
    c_grade_mult: 0.5
    max_single_pct: 0.25

  # SW-6: 시나리오 무효화 청산
  scenario_exit:
    enabled: true
    grace_days: 2
    min_pnl_for_hold: 0.05

  # SW-7: 줍줍 모드 — 52주 고점 대비 할인가 분할 매수
  # "어디까지 떨어지면 줍줍이다" + "우량주/대형주 위주 분할매수"
  bargain_hunter:
    enabled: true
    # 52주 고점 대비 낙폭별 매수 강도
    tiers:
      - { drop_pct: -20, label: "관심", position_mult: 0.3 }
      - { drop_pct: -30, label: "강력 포착", position_mult: 0.5 }
      - { drop_pct: -40, label: "줍줍매수", position_mult: 0.8 }
    # 대형주/우량주 필터
    min_market_cap_억: 5000     # 시총 5000억 이상
    require_grade_a: true        # A등급 이상
    # 출력 옵션
    show_target_prices: true     # "XX원까지 떨어지면 줍줍" 표시
