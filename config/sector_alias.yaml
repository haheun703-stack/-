# Sector Alias 사전 — 정보봇/KRX/WICS 분류 → 우리 표준 섹터 정규화
#
# 배경 (5/23, 5/22 HPSP 사고):
#   정보봇 dashboard_smart_money / sniper의 sector 필드는 KRX/WICS 분류 사용
#   (예: "반도체와반도체장비", "반도체"). 그러나 우리 sector_fire는
#   sector_fire_map.yaml의 한글 합성어 (예: "AI반도체") 사용.
#   문자열 직접 비교 시 매칭 실패 → fire_score 0으로 처리되어 시그널 손실.
#
# 본 사전으로 alias → canonical 정규화 후 매칭.
#
# 사용:
#   from src.use_cases.sector_normalizer import normalize_sector
#   normalize_sector("반도체와반도체장비")  → "AI반도체"
#   normalize_sector("이차전지")           → "2차전지"

