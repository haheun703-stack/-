# ──────────────────────────────────────────
# 밸류체인 릴레이 설정
# 대장주 급등 → 소부장 저평가 종목 발굴
# ──────────────────────────────────────────

# 대장주 발화 기준 (둘 중 하나 충족)
fire_threshold: 2.5        # 당일 +2.5% 이상
fire_vol_z: 1.5            # 거래량 z-score 1.5 이상
min_leader_weight: 10.0    # ETF 내 비중 10% 이상 = 대장주

# 소부장 "준비 완료" 필터
ready_filter:
  change_pct_max: 3.0      # 아직 덜 오름 (당일 +3% 이하)
  rsi_range: [25, 60]      # 과매도~적정 (과매수 제외)
  above_ma20: true          # 20일선 위 (추세 유지)

# 점수 배분 (100점)
score_weights:
  gap: 25           # 대장주 대비 미반영도
  technical: 25     # RSI/MACD/BB 기술적 지지
  flow: 25          # 외인/기관 수급
  value: 25         # 기관목표가 대비 저평가도

# 활성 섹터 (ETF 파일명 기준: {etf_code}_{sector}.json)
active_sectors:
  반도체: "091230"
  2차전지: "305540"
  IT: "139260"
  헬스케어: "143860"
  바이오: "364970"
  에너지화학: "139250"
  소프트웨어: "157490"
  방산: "463250"
  조선: "494670"

# 수동 대장주 오버라이드 (ETF 비중만으로 부족할 때)
leader_override:
  반도체: ["000660", "005930"]           # 하이닉스, 삼성전자
  2차전지: ["373220", "006400"]          # LG에너지, 삼성SDI
  바이오: ["207940", "068270"]           # 삼성바이오, 셀트리온
