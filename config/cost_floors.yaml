gap_zones:
  buy:
    max_pct: 15
    label: "매수 구간"
    emoji: "🟢"
    description: "생산원가 근처. 하방 제한, 상방 열림"
  watch:
    max_pct: 40
    label: "관찰"
    emoji: "🟡"
    description: "스프링 압축 가능. 시나리오 촉매 대기"
  hold:
    max_pct: 80
    label: "보류"
    emoji: "🟠"
    description: "상당 부분 반영. 추가 상승 여지 제한적"
  overheated:
    max_pct: 999
    label: "과열"
    emoji: "🔴"
    description: "프리미엄 포함. 하방 리스크 큼"
