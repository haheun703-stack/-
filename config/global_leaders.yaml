# ══════════════════════════════════════════════════════════
# 글로벌 대장주 → 한국 종목 연결 맵
# ══════════════════════════════════════════════════════════
# 용도: 섹터맵 페이지에서 "글로벌 대장주 → 한국 하위 종목" 연결 표시
# 관리: 퀀트봇에서 생성, 정보봇에서 FLOWX UI 연동
# 갱신: 분기 1회 수동 점검 (공급망 변동 시)
#
# 구조:
#   글로벌 대장주 ticker → yfinance 심볼
#   kr_stocks → 한국 종목 리스트
#     ticker: 6자리 종목코드
#     name: 종목명
#     relation: 공급/경쟁/자회사/협력 중 택1
#     detail: 구체적 연결 이유
#     revenue_dependency: 매출 의존도 (높음/중간/낮음/불명)
# ══════════════════════════════════════════════════════════

