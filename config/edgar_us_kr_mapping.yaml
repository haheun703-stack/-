# EDGAR 미국 빅테크 → 한국 수혜주 매핑 사전 (5/23 옵션 D)
#
# 배경:
#   정보봇이 EDGAR (미국 SEC 공시) 추적 → Form 4 내부자 거래 / 10-Q 어닝 /
#   8-K 중대 사건 등. 그러나 미국 ticker (NVDA/TSLA/AMD 등)만 있어
#   한국 종목 점수 산출 시 매칭 불가. 본 사전으로 자동 변환.
#
# 영향 강도 (weight):
#   primary (1.0):  핵심 공급사 / 직접 협력사
#   secondary (0.6): 동반 수혜 (HBM 메모리 등)
#   tertiary (0.3): 약한 동조 (시장 분위기 동조)
#
# 시그널 방향:
#   미국 호재 (어닝 비트 / 임원 대량 매수) → 한국 매핑 종목 호재
#   미국 악재 (실적 미스 / 임원 대량 매도 / 규제) → 한국 매핑 종목 약한 악재
#   (한국은 미국 빅테크의 부품/장비 공급자이므로 영향 방향 동일)

