
<div style="padding: 1rem 0;">
<div style="display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; margin-bottom: 1.5rem;">
  <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem;">
    <div style="font-size: 13px; color: var(--color-text-secondary);">아시아 프로판 (AFEI)</div>
    <div style="font-size: 22px; font-weight: 500; color: var(--color-text-danger);">+53%</div>
    <div style="font-size: 12px; color: var(--color-text-secondary);">2/27 ~ 3/18</div>
  </div>
  <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem;">
    <div style="font-size: 13px; color: var(--color-text-secondary);">유럽 ARA 프로판</div>
    <div style="font-size: 22px; font-weight: 500; color: var(--color-text-danger);">+64%</div>
    <div style="font-size: 12px; color: var(--color-text-secondary);">$562 → $923/t</div>
  </div>
  <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem;">
    <div style="font-size: 13px; color: var(--color-text-secondary);">한국 LPG (3/29)</div>
    <div style="font-size: 22px; font-weight: 500;">1,012원/L</div>
    <div style="font-size: 12px; color: var(--color-text-secondary);">정부 가격 통제 중</div>
  </div>
</div>
<div style="position: relative; width: 100%; height: 300px;">
  <canvas id="lpgChart"></canvas>
</div>
<div style="display: flex; flex-wrap: wrap; gap: 16px; margin-top: 12px; font-size: 12px; color: var(--color-text-secondary);">
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #D85A30;"></span>아시아 AFEI 프로판 ($/t)</span>
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #378ADD;"></span>유럽 ARA 프로판 ($/t)</span>
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #1D9E75;"></span>미국 Mont Belvieu ($/t)</span>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
const gridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
const textColor = isDark ? '#c2c0b6' : '#5F5E5A';

new Chart(document.getElementById('lpgChart'), {
  type: 'line',
  data: {
    labels: ['2월 초','2/27\n전쟁 전','3/2','3/5','3/9','3/13','3/18','3/23','3/28'],
    datasets: [
      {
        label: '아시아 AFEI',
        data: [480, 510, 590, 640, 710, 750, 780, 760, 740],
        borderColor: '#D85A30',
        borderWidth: 2.5,
        fill: false,
        tension: 0.3,
        pointRadius: 4,
        pointBackgroundColor: '#D85A30'
      },
      {
        label: '유럽 ARA',
        data: [520, 562, 640, 700, 780, 860, 923, 880, 850],
        borderColor: '#378ADD',
        borderWidth: 2.5,
        fill: false,
        tension: 0.3,
        pointRadius: 4,
        pointBackgroundColor: '#378ADD'
      },
      {
        label: '미국 Mont Belvieu',
        data: [340, 350, 377, 390, 416, 400, 395, 385, 380],
        borderColor: '#1D9E75',
        borderWidth: 2.5,
        fill: false,
        tension: 0.3,
        pointRadius: 4,
        pointBackgroundColor: '#1D9E75'
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: {
        grid: { color: gridColor },
        ticks: { color: textColor, font: { size: 11 }, maxRotation: 0 }
      },
      y: {
        min: 250,
        max: 1000,
        grid: { color: gridColor },
        ticks: {
          color: textColor,
          font: { size: 11 },
          callback: v => '$' + v
        }
      }
    }
  }
});
</script>
