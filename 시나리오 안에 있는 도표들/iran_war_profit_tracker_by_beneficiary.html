
<div style="padding: 1rem 0;">
<div style="position: relative; width: 100%; height: 380px;">
  <canvas id="profitChart"></canvas>
</div>
<div style="display: flex; flex-wrap: wrap; gap: 16px; margin-top: 8px; margin-bottom: 1.5rem; font-size: 12px; color: var(--color-text-secondary);">
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #E24B4A;"></span>방산업체 시총 증가</span>
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #EF9F27;"></span>무기 판매/계약</span>
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #378ADD;"></span>트럼프 주변 인물</span>
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #1D9E75;"></span>러시아 석유 수입 증가</span>
</div>
<div style="position: relative; width: 100%; height: 300px;">
  <canvas id="costChart"></canvas>
</div>
<div style="display: flex; flex-wrap: wrap; gap: 16px; margin-top: 8px; font-size: 12px; color: var(--color-text-secondary);">
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #E24B4A;"></span>미국 전쟁 비용</span>
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #EF9F27;"></span>걸프국 에너지 손실</span>
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #7F77DD;"></span>글로벌 경제 피해</span>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
const gc = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
const tc = isDark ? '#c2c0b6' : '#5F5E5A';

new Chart(document.getElementById('profitChart'), {
  type: 'bar',
  data: {
    labels: ['방산 5사\n시총 증가','무기 판매\n(확정 계약)','펜타곤\n추가예산 요청','트럼프-쿠시너\n사우디/UAE 딜','러시아\n유가 수입 증가\n(추정 연간)','이스라엘\n방산 수출 증가\n(추정)'],
    datasets: [{
      data: [200, 48, 200, 10.2, 45, 8],
      backgroundColor: ['#E24B4A','#EF9F27','rgba(239,159,39,0.5)','#378ADD','#1D9E75','#7F77DD'],
      borderRadius: 6,
      barThickness: 40
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    indexAxis: 'y',
    plugins: {
      legend: { display: false },
      title: { display: true, text: '수혜자별 이익 (단위: 10억 달러, $B)', color: tc, font: { size: 14, weight: '500' }, padding: { bottom: 16 } }
    },
    scales: {
      x: { grid: { color: gc }, ticks: { color: tc, font: { size: 11 }, callback: v => '$'+v+'B' } },
      y: { grid: { display: false }, ticks: { color: tc, font: { size: 11 } } }
    }
  }
});

new Chart(document.getElementById('costChart'), {
  type: 'bar',
  data: {
    labels: ['미국 전쟁 직접비용\n(30일)','걸프국 에너지\n인프라 피해','글로벌 GDP\n손실 추정','이란 피해\n(추정)','미국 소비자\n유류비 증가\n(연간 추정)'],
    datasets: [{
      data: [12, 85, 3500, 150, 55],
      backgroundColor: ['#E24B4A','#EF9F27','#7F77DD','#D85A30','#73726c'],
      borderRadius: 6,
      barThickness: 40
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    indexAxis: 'y',
    plugins: {
      legend: { display: false },
      title: { display: true, text: '전쟁 비용 / 피해 (단위: 10억 달러, $B)', color: tc, font: { size: 14, weight: '500' }, padding: { bottom: 16 } }
    },
    scales: {
      x: { grid: { color: gc }, ticks: { color: tc, font: { size: 11 }, callback: v => v >= 1000 ? '$'+(v/1000)+'T' : '$'+v+'B' } },
      y: { grid: { display: false }, ticks: { color: tc, font: { size: 11 } } }
    }
  }
});
</script>
