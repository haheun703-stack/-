
<div style="padding: 1rem 0;">
<div style="position: relative; width: 100%; height: 340px;">
  <canvas id="scenarioChart"></canvas>
</div>
<div style="display: flex; flex-wrap: wrap; gap: 16px; margin-top: 12px; font-size: 12px; color: var(--color-text-secondary);">
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #1D9E75;"></span>조기 종전 시나리오</span>
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #EF9F27;"></span>골드만삭스 기본 전망</span>
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #E24B4A;"></span>장기전 시나리오</span>
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #7F77DD;"></span>극단 시나리오 (2008 재현)</span>
</div>
<div style="margin-top: 1.5rem; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px;">
  <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem;">
    <div style="font-size: 13px; font-weight: 500; color: var(--color-text-success);">조기 종전 (4월 내 휴전)</div>
    <div style="font-size: 13px; color: var(--color-text-secondary); margin-top: 6px; line-height: 1.6;">
      Brent Q2 $76 → Q4 $66<br>WTI Q2 $71 → Q4 $62<br>호르무즈 6주 내 정상화
    </div>
  </div>
  <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem;">
    <div style="font-size: 13px; font-weight: 500; color: var(--color-text-warning);">GS 기본 전망</div>
    <div style="font-size: 13px; color: var(--color-text-secondary); margin-top: 6px; line-height: 1.6;">
      Brent 연평균 $85<br>WTI 연평균 $79<br>3~4월 $110 → Q4 $71
    </div>
  </div>
  <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem;">
    <div style="font-size: 13px; font-weight: 500; color: var(--color-text-danger);">장기전 (2개월+)</div>
    <div style="font-size: 13px; color: var(--color-text-secondary); margin-top: 6px; line-height: 1.6;">
      Brent Q4 $93<br>WTI Q4 $87+<br>호르무즈 장기 봉쇄 지속
    </div>
  </div>
  <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem;">
    <div style="font-size: 13px; font-weight: 500; color: #7F77DD;">극단 시나리오</div>
    <div style="font-size: 13px; color: var(--color-text-secondary); margin-top: 6px; line-height: 1.6;">
      WTI $147+ (2008 수준)<br>걸프 에너지 인프라 대량 파괴<br>글로벌 스태그플레이션
    </div>
  </div>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
const gridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
const textColor = isDark ? '#c2c0b6' : '#5F5E5A';

new Chart(document.getElementById('scenarioChart'), {
  type: 'line',
  data: {
    labels: ['현재\n3/30','4월','5월','6월','7월','8월','9월','10월','11월','12월'],
    datasets: [
      {
        label: '조기 종전',
        data: [103, 85, 76, 72, 70, 68, 66, 64, 63, 62],
        borderColor: '#1D9E75',
        borderWidth: 2,
        fill: false,
        tension: 0.4,
        pointRadius: 3,
        pointBackgroundColor: '#1D9E75'
      },
      {
        label: 'GS 기본',
        data: [103, 110, 95, 85, 80, 78, 75, 72, 70, 67],
        borderColor: '#EF9F27',
        borderWidth: 2.5,
        fill: false,
        tension: 0.4,
        pointRadius: 3,
        pointBackgroundColor: '#EF9F27'
      },
      {
        label: '장기전',
        data: [103, 115, 110, 105, 102, 100, 98, 95, 93, 93],
        borderColor: '#E24B4A',
        borderWidth: 2,
        fill: false,
        tension: 0.4,
        pointRadius: 3,
        pointBackgroundColor: '#E24B4A'
      },
      {
        label: '극단',
        data: [103, 125, 135, 147, 140, 135, 130, 125, 120, 115],
        borderColor: '#7F77DD',
        borderWidth: 1.5,
        borderDash: [4, 4],
        fill: false,
        tension: 0.4,
        pointRadius: 3,
        pointBackgroundColor: '#7F77DD'
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: {
        grid: { color: gridColor },
        ticks: { color: textColor, font: { size: 11 }, maxRotation: 0 }
      },
      y: {
        min: 50,
        max: 160,
        grid: { color: gridColor },
        ticks: {
          color: textColor,
          font: { size: 11 },
          callback: v => '$' + v
        },
        title: {
          display: true,
          text: 'WTI ($/배럴)',
          color: textColor,
          font: { size: 12 }
        }
      }
    }
  }
});
</script>
